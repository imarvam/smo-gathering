<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>التحدي الاستراتيجي</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');

/* ======= VARIABLES ======= */
:root {
  --ink:      #0b1d3a;
  --ink2:     #1e3a5f;
  --cobalt:   #1d4ed8;
  --sky:      #38bdf8;
  --gold:     #f59e0b;
  --gold2:    #fbbf24;
  --mint:     #10b981;
  --rose:     #f43f5e;
  --glass:    rgba(255,255,255,0.93);
  --shdw:     0 30px 90px rgba(11,29,58,.22);
  --r:        26px;
  --dur:      .3s;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }

/* ======= BODY / BG ======= */
body {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  background: linear-gradient(145deg,#0b1d3a 0%,#1e3a5f 40%,#0c2a4e 100%);
  position:relative;
}

/* Animated floating orbs */
.orb {
  position:fixed; border-radius:50%; pointer-events:none;
  filter:blur(70px); opacity:.18; animation:drift linear infinite;
}
.orb1 { width:500px;height:500px;background:#1d4ed8;top:-100px;right:-100px;animation-duration:20s; }
.orb2 { width:400px;height:400px;background:#0891b2;bottom:-80px;left:-80px;animation-duration:25s;animation-delay:-10s; }
.orb3 { width:300px;height:300px;background:#f59e0b;top:40%;left:50%;animation-duration:18s;animation-delay:-5s; }
@keyframes drift {
  0%  { transform:translate(0,0) scale(1); }
  33% { transform:translate(30px,-30px) scale(1.06); }
  66% { transform:translate(-20px,20px) scale(.95); }
  100%{ transform:translate(0,0) scale(1); }
}

/* Particles */
.particles { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
.p { position:absolute; border-radius:50%; animation:floatP ease-in-out infinite; }
@keyframes floatP {
  0%,100%{ transform:translateY(0) scale(1);opacity:var(--op); }
  50%    { transform:translateY(-40px) scale(1.1);opacity:calc(var(--op)*1.5); }
}

/* ======= CARD ======= */
.card {
  position:relative; z-index:2;
  width:97%; max-width:1240px; height:93vh;
  background:var(--glass);
  border-radius:var(--r);
  box-shadow:var(--shdw), 0 0 0 1px rgba(255,255,255,.35);
  display:flex; flex-direction:column;
  overflow:hidden;
  backdrop-filter:blur(20px);
}

/* Rainbow top strip */
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,#1d4ed8,#38bdf8,#10b981,#f59e0b,#f43f5e,#1d4ed8);
  background-size:200% 100%;
  animation:rainbow 4s linear infinite;
  z-index:10;
}
@keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }

/* ======= MUSIC BUTTON ======= */
.music-btn {
  position:absolute; top:18px; left:20px; z-index:20;
  width:42px; height:42px; border-radius:50%;
  background:linear-gradient(135deg,var(--cobalt),var(--sky));
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 16px rgba(29,78,216,.35);
  transition:transform var(--dur),box-shadow var(--dur);
}
.music-btn:hover { transform:scale(1.12); box-shadow:0 6px 22px rgba(29,78,216,.5); }
.music-btn svg { width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round; }

/* ======= SLIDES ======= */
.slide { display:none;width:100%;flex:1;animation:fadeUp .38s cubic-bezier(.34,1.1,.64,1); }
.slide.active { display:flex; }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

/* ======= MAIN LAYOUT ======= */
/* RTL → first child = RIGHT, second child = LEFT */
#s-map { flex-direction:row; align-items:stretch; }

/* ======= RIGHT PANEL: WHEEL ======= */
.pw {
  flex:1.2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:22px; padding:30px 36px;
  background:linear-gradient(160deg,#f0f8ff 0%,#e0f0ff 100%);
  border-left:1.5px solid rgba(180,215,255,.4);
  position:relative; overflow:hidden;
}
.pw::after {
  content:'';
  position:absolute; bottom:-60px; right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(29,78,216,.08),transparent);
  pointer-events:none;
}

.panel-label {
  font-size:1.35rem; font-weight:800; color:var(--ink2);
  letter-spacing:.3px; text-align:center;
  padding-bottom:6px;
  border-bottom:3px solid transparent;
  border-image:linear-gradient(90deg,var(--cobalt),var(--sky)) 1;
}

/* Wheel */
.wheel-wrap { position:relative; width:340px; height:340px; }

.ptr {
  position:absolute; top:-26px; left:50%; transform:translateX(-50%);
  z-index:20; filter:drop-shadow(0 5px 12px rgba(11,29,58,.35));
}

.wheel-ring {
  position:absolute; inset:0; border-radius:50%;
  border:11px solid var(--ink2);
  box-shadow:
    0 0 0 3px rgba(255,255,255,.7),
    0 14px 48px rgba(11,29,58,.3),
    inset 0 0 0 2px rgba(255,255,255,.2);
  pointer-events:none; z-index:5;
}
/* Gold accent ring */
.wheel-ring::after {
  content:'';
  position:absolute; inset:-3px; border-radius:50%;
  border:2px solid var(--gold);
  opacity:.5;
}

.wheel-svg-wrap {
  position:absolute; top:11px; left:11px;
  width:318px; height:318px;
  border-radius:50%; overflow:hidden;
}
#wheelSVG { width:318px;height:318px;display:block; }

.wheel-hub {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#fff 20%,var(--ink2) 100%);
  border:3px solid var(--ink);
  box-shadow:0 4px 14px rgba(0,0,0,.35);
  z-index:10;
}
.wheel-hub::after {
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:13px;height:13px;
  background:var(--gold);
  clip-path:polygon(50% 0%,61%35%,98%35%,68%57%,79%91%,50%70%,21%91%,32%57%,2%35%,39%35%);
}

/* Spin button */
.spin-btn {
  position:relative; overflow:hidden;
  padding:15px 48px;
  background:linear-gradient(135deg,var(--ink2),var(--cobalt));
  color:#fff; border:none; border-radius:50px;
  font-size:1.2rem; font-weight:800; font-family:'Tajawal',sans-serif;
  cursor:pointer; letter-spacing:.5px;
  box-shadow:0 8px 30px rgba(29,78,216,.38);
  transition:transform var(--dur),box-shadow var(--dur);
}
.spin-btn::before {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  pointer-events:none;
}
.spin-btn:hover:not(:disabled) {
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 16px 40px rgba(29,78,216,.5);
}
.spin-btn:active:not(:disabled) { transform:scale(.97); }
.spin-btn:disabled {
  background:linear-gradient(135deg,#94a3b8,#64748b);
  cursor:not-allowed; box-shadow:none;
}
/* Ripple */
.ripple {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,.35);
  transform:scale(0); animation:rpl .6s linear;
  pointer-events:none;
}
@keyframes rpl { to{transform:scale(4);opacity:0;} }

/* Picked box */
.picked-box {
  display:flex; align-items:center; gap:12px;
  padding:13px 30px; border-radius:18px;
  min-width:250px; justify-content:center;
  transition:all var(--dur);
}
.picked-box.idle {
  background:#f1f5fb; border:2px solid #dde5f0;
  color:#94a3b8; font-size:.95rem; font-weight:500;
}
.picked-box.active {
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  border:2px solid #93c5fd;
  box-shadow:0 6px 20px rgba(29,78,216,.14);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.picked-box .pb-dot {
  width:10px;height:10px;border-radius:50%;
  background:var(--cobalt); flex-shrink:0;
  animation:pulse2 1.5s ease infinite;
}
@keyframes pulse2 { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.4);opacity:.6;} }
.picked-box .pb-name { font-size:1.15rem;font-weight:800;color:var(--ink); }

/* ======= LEFT PANEL: GRID ======= */
.pg {
  flex:1;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:22px; padding:30px 36px;
  background:linear-gradient(160deg,#ffffff 0%,#f7fbff 100%);
}

.grid-wrap {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:11px; width:100%; max-width:340px;
}

/* Question squares */
.q-sq {
  aspect-ratio:1;
  background:#fff;
  border:2px solid #dbeafe;
  border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.45rem; font-weight:800; color:var(--ink2);
  cursor:pointer; transition:all .22s ease;
  box-shadow:0 2px 8px rgba(11,29,58,.07);
  position:relative; overflow:hidden; user-select:none;
}
.q-sq::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.8),transparent);
  pointer-events:none;
}
.q-sq:hover {
  transform:translateY(-7px) scale(1.08);
  border-color:var(--cobalt);
  background:linear-gradient(145deg,#eff6ff,#dbeafe);
  box-shadow:0 14px 28px rgba(29,78,216,.18);
}
.q-sq.active {
  border-color:var(--gold);
  background:linear-gradient(145deg,#fffbeb,#fef3c7);
  box-shadow:0 0 24px rgba(245,158,11,.4);
  color:var(--gold);
  animation:glowPulse 1.3s ease infinite;
}
.q-sq.done {
  background:linear-gradient(145deg,#f0fdf4,#dcfce7);
  border-color:#86efac; color:#16a34a;
  font-size:.9rem; pointer-events:none;
}
.q-sq.done svg{width:22px;height:22px;stroke:#16a34a;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
@keyframes glowPulse { 0%,100%{box-shadow:0 0 14px rgba(245,158,11,.3);}50%{box-shadow:0 0 30px rgba(245,158,11,.7);} }
@keyframes popIn { from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;} }

/* ======= QUESTION SLIDE ======= */
#s-q {
  flex-direction:column; align-items:center; justify-content:center;
  padding:40px 70px;
  background:linear-gradient(160deg,#f8faff 0%,#edf4ff 100%);
}
.prog-wrap { width:100%;max-width:760px;height:7px;background:#e2e8f0;border-radius:4px;margin-bottom:26px;overflow:hidden; }
.prog-bar  {
  height:100%; width:100%;
  background:linear-gradient(90deg,var(--cobalt),var(--sky));
  border-radius:4px; transition:width .2s linear;
}
.player-chip {
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 28px; border-radius:50px;
  background:linear-gradient(135deg,var(--ink2),var(--cobalt));
  color:#fff; font-weight:800; font-size:1.05rem;
  margin-bottom:28px;
  box-shadow:0 6px 20px rgba(29,78,216,.28);
}
.player-chip .chip-dot {
  width:8px;height:8px;border-radius:50%;background:#fff;opacity:.7;
}
.q-text {
  font-size:2rem; color:var(--ink); text-align:center;
  line-height:1.6; max-width:780px; font-weight:700; margin-bottom:34px;
}
.opts-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:15px; width:100%; max-width:760px;
}
.opt {
  padding:20px 22px;
  background:#fff; border:2px solid #e2e8f0;
  border-radius:18px; font-size:1.18rem;
  font-weight:600; cursor:pointer;
  transition:all .2s; color:#334155; text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
  position:relative; overflow:hidden;
}
.opt::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5),transparent);pointer-events:none;}
.opt:hover{border-color:var(--cobalt);background:linear-gradient(135deg,#eff6ff,#dbeafe);color:var(--ink);transform:translateY(-4px);box-shadow:0 10px 22px rgba(29,78,216,.12);}
.opt.correct{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#4ade80;color:#15803d;}
.opt.wrong{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#f87171;color:#b91c1c;}

/* ======= WIN ======= */
#s-win {
  flex-direction:column; align-items:center; justify-content:center;
  gap:24px;
  background:linear-gradient(160deg,#f8faff 0%,#edf4ff 100%);
}
.trophy-wrap {
  width:130px;height:130px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 14px 50px rgba(245,158,11,.45);
  animation:trophySway 2s ease infinite;
}
.trophy-wrap svg{width:68px;height:68px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
@keyframes trophySway{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-18px) rotate(2deg);}}
.win-title{font-size:3rem;color:var(--ink);font-weight:900;text-align:center;letter-spacing:-.5px;}
.win-sub{font-size:1.1rem;color:#64748b;text-align:center;}
.btn-replay{
  display:flex;align-items:center;gap:10px;
  padding:16px 52px;
  background:linear-gradient(135deg,var(--ink2),var(--cobalt));
  color:#fff;border:none;border-radius:50px;
  font-size:1.3rem;font-weight:800;font-family:'Tajawal',sans-serif;
  cursor:pointer;box-shadow:0 8px 28px rgba(29,78,216,.35);transition:all .2s;
  position:relative;overflow:hidden;
}
.btn-replay::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none;}
.btn-replay:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(29,78,216,.45);}
.btn-replay svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}

/* ======= OVERLAY ======= */
.overlay{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(8px);
  background:rgba(11,29,58,.25);
}
.ov-icon{
  width:150px;height:150px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  animation:ovPop .35s cubic-bezier(.34,1.56,.64,1) both;
}
.ov-icon.ok  {background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 18px 60px rgba(34,197,94,.45);}
.ov-icon.fail{background:linear-gradient(135deg,var(--rose),#be123c);box-shadow:0 18px 60px rgba(244,63,94,.45);}
.ov-icon svg{width:76px;height:76px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
@keyframes ovPop{from{transform:scale(.2);opacity:0;}to{transform:scale(1);opacity:1;}}

/* Confetti */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden;}
.cf{position:absolute;top:-10px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <div id="ov-icon" class="ov-icon">
      <svg id="ov-svg" viewBox="0 0 24 24"></svg>
    </div>
  </div>
</div>

/* ======================================
   MUSIC
====================================== */
let musicOn = false;
let firstInteraction = false;
const bgMusic = document.getElementById('bg-music');
bgMusic.volume = 0.22;

// Auto-start music on first ANY user interaction
function tryAutoMusic() {
  if (!firstInteraction) {
    firstInteraction = true;
    musicOn = true;
    bgMusic.play().then(() => {
      document.getElementById('music-btn').style.background = 'linear-gradient(135deg,#059669,#34d399)';
      document.getElementById('music-icon').innerHTML = '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>';
    }).catch(()=>{});
  }
}
document.addEventListener('click', tryAutoMusic, {once: true});

function toggleMusic() {
  musicOn = !musicOn;
  firstInteraction = true;
  const icon = document.getElementById('music-icon');
  if (musicOn) {
    bgMusic.play().catch(()=>{});
    icon.innerHTML = '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>';
    document.getElementById('music-btn').style.background = 'linear-gradient(135deg,#059669,#34d399)';
  } else {
    bgMusic.pause();
    icon.innerHTML = '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><line x1="2" y1="2" x2="22" y2="22" stroke="#fff" stroke-width="2"/>';
    document.getElementById('music-btn').style.background = 'linear-gradient(135deg,#1d4ed8,#38bdf8)';
  }
}

/* ======================================
   PARTICLES
====================================== */
(function createParticles() {
  const cont = document.getElementById('particles');
  const colors = ['rgba(255,255,255,.15)','rgba(56,189,248,.2)','rgba(245,158,11,.15)'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const size = 4 + Math.random() * 10;
    const op   = 0.08 + Math.random() * 0.15;
    const dur  = 5 + Math.random() * 8;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --op:${op};
      animation-duration:${dur}s;
      animation-delay:${-Math.random()*dur}s;
    `;
    cont.appendChild(p);
  }
})();

/* ======================================
   RIPPLE EFFECT
====================================== */
function addRipple(btn, e) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left  = (e.clientX - rect.left - size/2) + 'px';
  r.style.top   = (e.clientY - rect.top  - size/2) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 650);
}

/* ======================================
   CONFETTI
====================================== */
function launchConfetti() {
  const cont   = document.getElementById('confetti');
  const colors = ['#1d4ed8','#f59e0b','#10b981','#f43f5e','#38bdf8','#fbbf24'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'cf';
    const w   = 6 + Math.random() * 8;
    const h   = 8 + Math.random() * 12;
    const dur = 1.5 + Math.random() * 2;
    c.style.cssText = `
      left:${Math.random()*100}vw;
      width:${w}px;height:${h}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${dur}s;
      animation-delay:${Math.random()*.5}s;
      opacity:.9;
      transform:rotate(${Math.random()*360}deg);
    `;
    cont.appendChild(c);
    setTimeout(() => c.remove(), (dur + .5) * 1000);
  }
}

/* ======================================
   WHEEL — SVG
====================================== */
const FILLS   = ['#ffd6e0','#ffdbb5','#fff9b0','#d4f5c0','#b0e8f7','#d5c8f7','#ffc8df','#c8f0e8','#ffeab0','#c8dcf7','#f7c8f0','#c8f7d5','#f7e0c8','#c8c8f7','#e8f7c8','#ffe4b0'];
const STROKES = ['#f9a8c0','#fba85f','#fcd54f','#6ee088','#38c6ed','#9575cd','#f06090','#3dcfb1','#fbc835','#5ba8f0','#c86cbe','#44c866','#f07844','#7080d5','#94d86c','#fba040'];
const TXTS    = ['#9d174d','#92400e','#78350f','#14532d','#0c4a6e','#3b0764','#831843','#134e4a','#713f12','#1e3a5f','#581c87','#14532d','#7c2d12','#1e1b4b','#365314','#7c2d12'];

function buildWheel() {
  const svg = document.getElementById('wheelSVG');
  const n   = employees.length;
  const deg = 360 / n;
  svg.innerHTML = '';

  employees.forEach((name, i) => {
    const a1 = i * deg, a2 = a1 + deg, am = a1 + deg / 2;
    const R  = d => d * Math.PI / 180;
    const r  = 155;
    const x1 = r * Math.cos(R(a1)), y1 = r * Math.sin(R(a1));
    const x2 = r * Math.cos(R(a2)), y2 = r * Math.sin(R(a2));
    const lg = deg > 180 ? 1 : 0;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M0,0 L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} Z`);
    path.setAttribute('fill',   FILLS[i % FILLS.length]);
    path.setAttribute('stroke', STROKES[i % STROKES.length]);
    path.setAttribute('stroke-width','1.8');
    svg.appendChild(path);

    const TR = 95, tx = TR * Math.cos(R(am)), ty = TR * Math.sin(R(am));
    const parts = splitName(name);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${tx},${ty}) rotate(${am + 90})`);
    parts.forEach((part, pi) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size', parts.length > 1 ? '9' : '10.5');
      t.setAttribute('font-weight','700');
      t.setAttribute('font-family','Tajawal, Arial, sans-serif');
      t.setAttribute('fill', TXTS[i % TXTS.length]);
      t.setAttribute('y', (pi - (parts.length - 1) / 2) * 12 + '');
      t.textContent = part;
      g.appendChild(t);
    });
    svg.appendChild(g);
  });
}

function splitName(name) {
  const p = name.trim().split(' ');
  return p.length <= 1 ? [name] : p.length === 2 ? p : [p[0], p.slice(1).join(' ')];
}

/* ======================================
   SPIN
====================================== */
let wheelRot = 0, spinning = false, rafId = null, spinStart = null;
const SPIN_DUR = 4800;
let done = new Set(), played = new Set(), curPlayer = null, qTimer = null;

function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

function spinWheel(event) {
  if (spinning) return;
  const avail = employees.map((_,i)=>i).filter(i => !played.has(i));
  if (!avail.length) { alert('تم اختيار جميع المشاركين!'); return; }

  if (event) addRipple(document.getElementById('spin-btn'), event);

  spinning = true;
  curPlayer = null;
  document.getElementById('spin-btn').disabled = true;
  setPicked(null, true);
  document.querySelectorAll('.q-sq:not(.done)').forEach(s => s.classList.remove('active'));

  // play spin sound
  const sndSpin = document.getElementById('snd-spin');
  sndSpin.currentTime = 0;
  sndSpin.play().catch(()=>{});

  const pick   = avail[Math.floor(Math.random() * avail.length)];
  const n      = employees.length;
  const segDeg = 360 / n;
  const segMid = pick * segDeg + segDeg / 2;
  const extra  = (7 + Math.floor(Math.random() * 4)) * 360;
  const needed = ((270 - segMid) % 360 + 360) % 360;
  const diff   = ((needed - wheelRot % 360) + 360) % 360;
  const s0     = wheelRot, target = wheelRot + extra + diff;

  spinStart = null;
  function animate(ts) {
    if (!spinStart) spinStart = ts;
    const prog = Math.min((ts - spinStart) / SPIN_DUR, 1);
    const cur  = s0 + (target - s0) * easeOut(prog);
    document.getElementById('wheelSVG').style.transform = `rotate(${cur}deg)`;
    if (prog < 1) { rafId = requestAnimationFrame(animate); return; }

    wheelRot  = target;
    spinning  = false;
    curPlayer = employees[pick];
    played.add(pick);
    setPicked(curPlayer, false);
    document.getElementById('spin-btn').disabled = false;
    document.querySelectorAll('.q-sq:not(.done)').forEach(s => s.classList.add('active'));
  }
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(animate);
}

function setPicked(name, loading) {
  const box = document.getElementById('picked-box');
  if (loading) {
    box.className = 'picked-box idle';
    box.innerHTML = '<span>جاري الاختيار...</span>';
  } else if (!name) {
    box.className = 'picked-box idle';
    box.innerHTML = '<span>في انتظار الدوران</span>';
  } else {
    box.className = 'picked-box active';
    box.innerHTML = `<span class="pb-dot"></span><span class="pb-name">${name}</span>`;
  }
}

/* ======================================
   GRID
====================================== */
function buildGrid() {
  const g = document.getElementById('grid-list');
  g.innerHTML = '';
  for (let i = 1; i <= 16; i++) {
    const b = document.createElement('div');
    if (done.has(i-1)) {
      b.className = 'q-sq done';
      b.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else {
      b.className = 'q-sq' + (curPlayer ? ' active' : '');
      b.textContent = i;
      b.onclick = (e) => {
        if (!curPlayer) { alert('دوّر العجلة أولاً!'); return; }
        addRipple(b, e);
        setTimeout(() => openQ(i-1), 120);
      };
    }
    g.appendChild(b);
  }
}

/* ======================================
   QUESTION
====================================== */
function openQ(idx) {
  showSlide('s-q');
  document.getElementById('player-name').textContent = curPlayer;
  document.getElementById('q-text').textContent = questions[idx].q;
  document.getElementById('prog-bar').style.width = '100%';

  const og = document.getElementById('opts-grid');
  og.innerHTML = '';
  questions[idx].a.forEach((txt, i) => {
    const d = document.createElement('div');
    d.className = 'opt';
    d.textContent = txt;
    d.onclick = (e) => { addRipple(d, e); setTimeout(() => checkAns(idx, i, d), 80); };
    og.appendChild(d);
  });

  let t = 100;
  clearInterval(qTimer);
  qTimer = setInterval(() => {
    t--;
    document.getElementById('prog-bar').style.width = t + '%';
    // Color warning when <30%
    if (t < 30) document.getElementById('prog-bar').style.background = 'linear-gradient(90deg,#f43f5e,#fb923c)';
    else         document.getElementById('prog-bar').style.background = 'linear-gradient(90deg,#1d4ed8,#38bdf8)';
    if (t <= 0) { clearInterval(qTimer); checkAns(idx, -1, null); }
  }, 200);
}

function checkAns(qi, chosen, el) {
  clearInterval(qTimer);
  const cor = questions[qi].c;
  const ov  = document.getElementById('overlay');
  const oic = document.getElementById('ov-icon');
  const osg = document.getElementById('ov-svg');
  ov.style.display = 'flex';

  if (chosen === cor) {
    if (el) el.classList.add('correct');
    oic.className = 'ov-icon ok';
    osg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    document.getElementById('snd-correct').currentTime = 0;
    document.getElementById('snd-correct').volume = 1.0;
    document.getElementById('snd-correct').play().catch(()=>{});
    launchConfetti();
  } else {
    if (el) el.classList.add('wrong');
    document.querySelectorAll('.opt')[cor]?.classList.add('correct');
    oic.className = 'ov-icon fail';
    osg.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    document.getElementById('snd-fail').play().catch(()=>{});
  }

  done.add(qi);
  curPlayer = null;
  document.querySelectorAll('.q-sq').forEach(s => s.classList.remove('active'));

  setTimeout(() => {
    ov.style.display = 'none';
    if (done.size >= 16) {
      showSlide('s-win');
      document.getElementById('win-title').textContent = 'انتهت اللعبة! شكراً للجميع';
      launchConfetti();
      setTimeout(launchConfetti, 800);
    } else {
      showSlide('s-map');
      setPicked(null, false);
      buildGrid();
    }
  }, 1800);
}

function showSlide(id) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ======================================
   INIT
====================================== */
async function init() {
  if (sb) {
    try {
      const {data:e} = await sb.from('employees').select('name');
      if (e?.length) employees = e.map(r => r.name);
      const {data:q} = await sb.from('game_questions').select('*').order('id',{ascending:true});
      if (q?.length) questions = q.map(r=>({q:r.question,a:r.options,c:r.correct_index}));
    } catch(err) { console.error('Supabase:',err); }
  }
  buildWheel();
  buildGrid();
}

window.addEventListener('DOMContentLoaded', init);
</script>
