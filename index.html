<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>التحدي الاستراتيجي</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');

:root {
  --navy:    #0f2044;
  --navy2:   #1a3560;
  --blue:    #2563eb;
  --blue2:   #3b82f6;
  --gold:    #f59e0b;
  --gold2:   #fbbf24;
  --teal:    #0891b2;
  --teal2:   #06b6d4;
  --light:   #f0f6ff;
  --white:   #ffffff;
  --glass:   rgba(255,255,255,0.97);
  --shadow:  0 24px 80px rgba(15,32,68,.18);
  --radius:  28px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}

/* ====== BODY & BG ====== */
body {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  background: radial-gradient(ellipse at 20% 50%, #c7deff 0%, #d9ecff 40%, #b8d9ff 100%);
}

/* BG SVG */
.bg {
  position:fixed;inset:0;pointer-events:none;z-index:0;
}

/* ====== CARD ====== */
.card {
  position:relative; z-index:1;
  width:97%; max-width:1220px; height:92vh;
  background:var(--glass);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  border:1.5px solid rgba(200,225,255,.7);
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* TOP HEADER STRIP */
.card-header {
  height:6px;
  background:linear-gradient(90deg,var(--navy),var(--blue),var(--teal),var(--gold));
}

/* ====== SLIDES ====== */
.slide{display:none;width:100%;flex:1;animation:fadeUp .35s ease;}
.slide.active{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ====== MAIN LAYOUT ====== */
/* RTL: first child = right, second = left */
#s-map {
  flex-direction:row;
  align-items:stretch;
}

/* ===== RIGHT PANEL: WHEEL ===== */
.panel-wheel {
  flex:1.15;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px;
  padding:28px 32px;
  background:linear-gradient(160deg,#f8fbff 0%,#eef5ff 100%);
  border-left:1.5px solid rgba(180,215,255,.5);
}

.panel-title {
  display:flex; align-items:center; gap:10px;
  font-size:1.3rem; font-weight:800; color:var(--navy);
  letter-spacing:.5px;
}
.panel-title .icon-wrap {
  width:36px; height:36px;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 12px rgba(37,99,235,.25);
}
.panel-title .icon-wrap svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Wheel */
.wheel-wrap {
  position:relative;
  width:330px; height:330px;
}

.wheel-pointer-wrap {
  position:absolute;
  top:-24px; left:50%;
  transform:translateX(-50%);
  z-index:20;
  filter:drop-shadow(0 4px 10px rgba(15,32,68,.3));
}

.wheel-ring {
  position:absolute; inset:0;
  border-radius:50%;
  border:10px solid var(--navy2);
  box-shadow:
    0 0 0 3px rgba(255,255,255,.6),
    0 12px 40px rgba(15,32,68,.3),
    inset 0 0 0 2px rgba(255,255,255,.2);
  pointer-events:none; z-index:5;
}

.wheel-svg-wrap {
  position:absolute;
  top:10px; left:10px;
  width:310px; height:310px;
  border-radius:50%; overflow:hidden;
}
#wheelSVG{width:310px;height:310px;display:block;}

.wheel-hub {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#fff 25%,var(--navy2) 100%);
  border:3px solid var(--navy);
  box-shadow:0 3px 12px rgba(0,0,0,.3);
  z-index:10;
}
/* Gold star in hub */
.wheel-hub::after {
  content:'';
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:12px; height:12px;
  background:var(--gold);
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
}

/* Spin button */
.spin-btn {
  display:flex; align-items:center; gap:10px;
  padding:14px 44px;
  background:linear-gradient(135deg,var(--navy2),var(--blue));
  color:#fff; border:none; border-radius:50px;
  font-size:1.15rem; font-weight:800; font-family:'Tajawal',sans-serif;
  cursor:pointer; letter-spacing:.5px;
  box-shadow:0 8px 28px rgba(37,99,235,.35);
  transition:transform .2s,box-shadow .2s;
}
.spin-btn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 36px rgba(37,99,235,.45);}
.spin-btn:disabled{background:linear-gradient(135deg,#94a3b8,#cbd5e1);cursor:not-allowed;box-shadow:none;transform:none;}
.spin-btn svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Picked */
.picked-box {
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  border:2px solid #93c5fd;
  border-radius:16px;
  padding:12px 28px;
  min-width:240px;
  justify-content:center;
  box-shadow:0 4px 14px rgba(37,99,235,.1);
}
.picked-box .pb-icon{width:24px;height:24px;flex-shrink:0;}
.picked-box .pb-text{font-size:1.15rem;font-weight:800;color:var(--navy);white-space:nowrap;}
.picked-box.idle{background:#f8fafc;border-color:#cbd5e1;}
.picked-box.idle .pb-text{font-size:.95rem;font-weight:500;color:#94a3b8;}

/* ===== LEFT PANEL: GRID ===== */
.panel-grid {
  flex:1;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px;
  padding:28px 32px;
  background:linear-gradient(160deg,#ffffff 0%,#f5f9ff 100%);
}

/* Grid */
.grid-wrap {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  width:100%; max-width:340px;
}
.q-sq {
  aspect-ratio:1;
  background:linear-gradient(145deg,#f0f6ff,#dbeafe);
  border:2px solid #93c5fd;
  border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:2px;
  font-size:1.4rem; font-weight:800; color:var(--navy);
  cursor:pointer; transition:.22s;
  box-shadow:0 3px 10px rgba(37,99,235,.08);
  user-select:none; position:relative; overflow:hidden;
}
.q-sq::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.6),transparent);
  pointer-events:none;
}
.q-sq:hover{transform:translateY(-6px) scale(1.06);background:linear-gradient(145deg,#dbeafe,#bfdbfe);box-shadow:0 12px 24px rgba(37,99,235,.2);}
.q-sq.active{border-color:var(--gold);color:var(--gold);background:linear-gradient(145deg,#fffbeb,#fef3c7);box-shadow:0 0 22px rgba(245,158,11,.35);animation:glow 1.2s infinite;}
.q-sq.done{background:linear-gradient(145deg,#f0fdf4,#dcfce7);border-color:#86efac;color:#16a34a;pointer-events:none;font-size:1rem;}
.q-sq.done svg{width:22px;height:22px;stroke:#16a34a;stroke-width:2.5;fill:none;}
@keyframes glow{0%,100%{box-shadow:0 0 14px rgba(245,158,11,.3);}50%{box-shadow:0 0 28px rgba(245,158,11,.7);}}

/* ===== QUESTION SLIDE ===== */
#s-q {
  flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 60px;
  background:linear-gradient(160deg,#f8fbff,#eef5ff);
}
.prog-wrap{width:100%;max-width:740px;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:24px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .2s linear;border-radius:4px;}
.player-chip{
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 28px; border-radius:50px;
  background:linear-gradient(135deg,var(--navy2),var(--blue));
  color:#fff; font-weight:800; font-size:1.05rem;
  margin-bottom:24px;
  box-shadow:0 6px 18px rgba(37,99,235,.25);
}
.player-chip svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.q-text{font-size:2rem;color:var(--navy);text-align:center;line-height:1.55;max-width:760px;font-weight:700;margin-bottom:32px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:740px;}
.opt{
  padding:22px 20px;
  background:#fff;
  border:2px solid #e2e8f0;
  border-radius:18px;
  font-size:1.2rem; font-weight:600; cursor:pointer;
  transition:.2s; color:#334155; text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
  position:relative; overflow:hidden;
}
.opt::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5),transparent);pointer-events:none;}
.opt:hover{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:var(--blue2);color:var(--navy);transform:translateY(-3px);box-shadow:0 8px 20px rgba(37,99,235,.12);}
.opt.correct{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#4ade80;color:#15803d;}
.opt.wrong{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#f87171;color:#b91c1c;}

/* ===== WIN SLIDE ===== */
#s-win{flex-direction:column;align-items:center;justify-content:center;gap:24px;background:linear-gradient(160deg,#f8fbff,#eef5ff);}
.win-icon-wrap{
  width:120px; height:120px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 12px 40px rgba(245,158,11,.4);
  animation:trophyPop 1.5s ease infinite;
}
.win-icon-wrap svg{width:64px;height:64px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
@keyframes trophyPop{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-16px) scale(1.06);}}
.win-title{font-size:2.8rem;color:var(--navy);text-align:center;font-weight:900;letter-spacing:-.5px;}
.win-sub{font-size:1.1rem;color:#64748b;text-align:center;font-weight:400;}
.btn-replay{
  display:flex; align-items:center; gap:10px;
  padding:16px 50px;
  background:linear-gradient(135deg,var(--navy2),var(--blue));
  color:#fff; border:none; border-radius:50px;
  font-size:1.3rem; font-weight:800; font-family:'Tajawal',sans-serif;
  cursor:pointer; box-shadow:0 8px 28px rgba(37,99,235,.35); transition:.2s;
}
.btn-replay:hover{transform:translateY(-3px);}
.btn-replay svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}

/* ===== OVERLAY ===== */
.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);background:rgba(15,32,68,.2);}
.overlay-icon{
  width:140px; height:140px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
.overlay-icon.ok{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 16px 50px rgba(34,197,94,.4);}
.overlay-icon.fail{background:linear-gradient(135deg,#ef4444,#b91c1c);box-shadow:0 16px 50px rgba(239,68,68,.4);}
.overlay-icon svg{width:72px;height:72px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
@keyframes popIn{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<!-- ====== GAME CARD ====== -->

  <div class="card-header"></div>

  <!-- MAIN GAME -->
  <div id="s-map" class="slide active">

    <!-- RIGHT: WHEEL (first in RTL) -->
    <div class="panel-wheel">
      <div class="panel-title">
        <div class="icon-wrap">
          <!-- Wheel/spin icon -->

      <div class="wheel-wrap">
        <!-- Pointer -->

          <svg width="34" height="44" viewBox="0 0 34 44">
            <polygon points="17,0 34,44 17,34 0,44" fill="#0f2044"/>

<script>
/* ========== SUPABASE ========== */
const SB_URL = 'https://peppyvyilwbiynvzjffk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlcHB5dnlpbHdiaXludnpqZmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDYwMzIsImV4cCI6MjA5MDg4MjAzMn0.CgtFQE1HfxxF5lMhxrCNzKRCr8M-BMMwj1jOwbVPsuw';
const sb = (typeof window.supabase !== 'undefined') ? window.supabase.createClient(SB_URL, SB_KEY) : null;

/* ========== DATA ========== */
let employees = [
  "عائشة الكواري","شريفة المنصوري","ريم المحمد","مريم القوز","ندى اليامي",
  "ياسمين العجي","لولوه آل ثاني","رامي أبو زيتون","وصال العنزي","فاطمة الكبيسي",
  "عائشة الكعبي","مريم الغانم","المها المالكي","موضي الكواري","نورة السويدي","جوليان أبو خليل"
];
let questions = [
  {q:"ما هو الهدف الأساسي من التخطيط الاستراتيجي؟",a:["تحديد الاتجاه المستقبلي للمنظمة","إصدار تقارير شهرية","الإنفاق العشوائي","تقليل الموظفين"],c:0},
  {q:"كيف نتعامل مع تعطل نظام البيانات؟",a:["نأمل أن لا يحدث","خطة طوارئ مسبقة","نستدعي الفني لاحقاً","نغلق المكتب"],c:1},
  {q:"أي من هذه مكونات الخطة الاستراتيجية؟",a:["الرؤية والرسالة والأهداف","أحلام عشوائية","الميزانية فقط","تقليد المنافسين"],c:0},
  {q:"ما أفضل ممارسة لضمان استمرارية العمل؟",a:["اختبار البدائل بانتظام","كتابة الخطة ونسيانها","الاعتماد على الحظ","توظيف شخص واحد"],c:0},
  {q:"كم مرة يجب مراجعة الخطة الاستراتيجية؟",a:["سنوياً أو عند تغييرات كبرى","كل 5 سنوات","لا داعي للمراجعة","كلما تذكرنا"],c:0},
  {q:"ما أخطر سيناريو يواجه الأعمال؟",a:["فقدان القيادة والبيانات معاً","انتهاء القهوة","موظف في إجازة","اجتماع مطول"],c:0},
  {q:"تحديات تنفيذ الاستراتيجية؟",a:["قلة الموارد ومقاومة التغيير","المال فقط","الموظفون فقط","لا توجد تحديات"],c:0},
  {q:"ما الفرق الرئيسي بين خطة استمرارية الأعمال (BCP) وخطة التعافي من الكوارث (DRP)؟",a:["BCP تضمن استمرار العمليات الحيوية والDRP تعيد بناء الأنظمة المتوقفة","هما خطتان متطابقتان بمسمّيين مختلفين","BCP للتقنية فقط والDRP للموارد البشرية","DRP أشمل من BCP في جميع الحالات"],c:0},
  {q:"بما تتميز المؤسسات الناجحة؟",a:["التنبؤ والتكيف والقيادة","الحظ","تجنب التغيير","النسخ"],c:0},
  {q:"في مصفوفة تقييم المخاطر، كيف يُحسب مستوى الخطر؟",a:["الاحتمالية فقط","التأثير فقط","الاحتمالية × التأثير","التكلفة والوقت معاً"],c:2},
  {q:"ما المقصود بـ 'شهية المخاطرة' (Risk Appetite) في إدارة المخاطر؟",a:["مقدار المخاطر الذي تقبل المؤسسة تحمّله لتحقيق أهدافها","عدد المخاطر الموجودة في المؤسسة","تكلفة التأمين ضد المخاطر","الإجراءات المتخذة لتجنب جميع المخاطر"],c:0},
  {q:"المؤسسات التي لا تخطط؟",a:["تخطط للفشل","تعيش اللحظة","أكثر سعادة","تعتمد على النجوم"],c:0},
  {q:"عدد دول مجلس التعاون الخليجي؟",a:["6","5","7","4"],c:0},
  {q:"ما الغرض الأساسي من مؤشرات الأداء الرئيسية (KPIs) في التخطيط الاستراتيجي؟",a:["قياس مدى التقدم نحو تحقيق الأهداف الاستراتيجية","تحديد رواتب الموظفين","تقليص ميزانية التشغيل","استبدال الخطة الاستراتيجية السنوية"],c:0},
  {q:"آخر مرحلة من مراحل التخطيط الاستراتيجي هي التنفيذ... هل هذا صحيح؟",a:["نعم، التنفيذ هو الأخير دائماً","خطأ، آخر مرحلة هي التقييم والمتابعة","نعم، لأن التنفيذ يسبق كل شيء","لا توجد مراحل محددة"],c:1},
  {q:"ما أول خطوة عند اكتشاف خطر جديد؟",a:["تقييم الخطر وإبلاغ الجهة المعنية فوراً","تجاهله وانتظار تطوره","إخبار الزملاء بشكل غير رسمي","إغلاق القسم المتأثر فوراً"],c:0}
];

/* ========== PASTEL PALETTE ========== */
const FILLS   = ['#ffd6e0','#ffdbb5','#fff9b0','#d4f5c0','#b0e8f7','#d5c8f7','#ffc8df','#c8f0e8','#ffeab0','#c8dcf7','#f7c8f0','#c8f7d5','#f7e0c8','#c8c8f7','#e8f7c8','#ffe4b0'];
const STROKES = ['#f9a8c0','#fba85f','#fcd54f','#6ee088','#38c6ed','#9575cd','#f06090','#3dcfb1','#fbc835','#5ba8f0','#c86cbe','#44c866','#f07844','#7080d5','#94d86c','#fba040'];
const TXTS    = ['#9d174d','#92400e','#78350f','#14532d','#0c4a6e','#3b0764','#831843','#134e4a','#713f12','#1e3a5f','#581c87','#14532d','#7c2d12','#1e1b4b','#365314','#7c2d12'];

/* ========== WHEEL (SVG) ========== */
let wheelRot  = 0;
let spinning  = false;
let rafId     = null;
let spinStart = null;
const SPIN_DUR = 4600;

function buildWheel() {
  const svg = document.getElementById('wheelSVG');
  const n   = employees.length;
  const deg = 360 / n;
  svg.innerHTML = '';

  employees.forEach((name, i) => {
    const a1 = i * deg, a2 = a1 + deg, am = a1 + deg / 2;
    const r  = (d) => d * Math.PI / 180;
    const R  = 152;
    const x1 = R * Math.cos(r(a1)), y1 = R * Math.sin(r(a1));
    const x2 = R * Math.cos(r(a2)), y2 = R * Math.sin(r(a2));
    const lg = deg > 180 ? 1 : 0;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M0,0 L${x1},${y1} A${R},${R} 0 ${lg},1 ${x2},${y2} Z`);
    path.setAttribute('fill',   FILLS[i % FILLS.length]);
    path.setAttribute('stroke', STROKES[i % STROKES.length]);
    path.setAttribute('stroke-width','1.5');
    svg.appendChild(path);

    const TR = 90;
    const tx = TR * Math.cos(r(am));
    const ty = TR * Math.sin(r(am));
    const parts = splitName(name);

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${tx},${ty}) rotate(${am + 90})`);
    parts.forEach((part, pi) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size', parts.length > 1 ? '9' : '10.5');
      t.setAttribute('font-weight','700');
      t.setAttribute('font-family','Tajawal, Arial, sans-serif');
      t.setAttribute('fill', TXTS[i % TXTS.length]);
      t.setAttribute('y', (pi - (parts.length - 1) / 2) * 12 + '');
      t.textContent = part;
      g.appendChild(t);
    });
    svg.appendChild(g);
  });
}

function splitName(name) {
  const p = name.trim().split(' ');
  return p.length <= 1 ? [name] : p.length === 2 ? p : [p[0], p.slice(1).join(' ')];
}

function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

/* ========== SPIN ========== */
let done = new Set(), played = new Set(), currentPlayer = null, qTimer = null;

function spinWheel() {
  if (spinning) return;
  const avail = employees.map((_,i)=>i).filter(i => !played.has(i));
  if (!avail.length) { alert('تم اختيار جميع المشاركين!'); return; }

  spinning = true;
  currentPlayer = null;
  document.getElementById('spin-btn').disabled = true;
  setPicked(null);
  document.querySelectorAll('.q-sq:not(.done)').forEach(s => s.classList.remove('active'));

  const pick    = avail[Math.floor(Math.random() * avail.length)];
  const n       = employees.length;
  const segDeg  = 360 / n;
  const segMid  = pick * segDeg + segDeg / 2;
  const extra   = (6 + Math.floor(Math.random() * 4)) * 360;
  const needed  = ((270 - segMid) % 360 + 360) % 360;
  const diff    = ((needed - wheelRot % 360) + 360) % 360;
  const start0  = wheelRot;
  const target  = wheelRot + extra + diff;

  spinStart = null;
  function animate(ts) {
    if (!spinStart) spinStart = ts;
    const prog = Math.min((ts - spinStart) / SPIN_DUR, 1);
    const cur  = start0 + (target - start0) * easeOut(prog);
    document.getElementById('wheelSVG').style.transform = `rotate(${cur}deg)`;
    if (prog < 1) { rafId = requestAnimationFrame(animate); return; }

    wheelRot = target;
    spinning = false;
    currentPlayer = employees[pick];
    played.add(pick);
    setPicked(currentPlayer);
    document.getElementById('spin-btn').disabled = false;
    document.querySelectorAll('.q-sq:not(.done)').forEach(s => s.classList.add('active'));
  }
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(animate);
}

function setPicked(name) {
  const box = document.getElementById('picked-box');
  const iconSVG = `<svg class="pb-icon" viewBox="0 0 24 24" fill="none" stroke="${name ? '#2563eb' : '#cbd5e1'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  if (!name) {
    box.className = 'picked-box idle';
    box.innerHTML = iconSVG + '<span class="pb-text">في انتظار الدوران</span>';
  } else {
    box.className = 'picked-box';
    box.innerHTML = iconSVG + `<span class="pb-text">${name}</span>`;
  }
}

/* ========== GRID ========== */
function buildGrid() {
  const g = document.getElementById('grid-list');
  g.innerHTML = '';
  for (let i = 1; i <= 16; i++) {
    const b = document.createElement('div');
    if (done.has(i-1)) {
      b.className = 'q-sq done';
      // checkmark icon
      b.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else {
      b.className = 'q-sq' + (currentPlayer ? ' active' : '');
      b.textContent = i;
      b.onclick = () => {
        if (!currentPlayer) { alert('دوّر العجلة أولاً لاختيار مشارك!'); return; }
        openQ(i - 1);
      };
    }
    g.appendChild(b);
  }
}

/* ========== QUESTION ========== */
function openQ(idx) {
  showSlide('s-q');
  document.getElementById('player-name').textContent = currentPlayer;
  document.getElementById('q-text').textContent = questions[idx].q;
  document.getElementById('prog-bar').style.width = '100%';

  const og = document.getElementById('opts-grid');
  og.innerHTML = '';
  questions[idx].a.forEach((txt, i) => {
    const d = document.createElement('div');
    d.className = 'opt';
    d.textContent = txt;
    d.onclick = () => checkAns(idx, i, d);
    og.appendChild(d);
  });

  let t = 100;
  clearInterval(qTimer);
  qTimer = setInterval(() => {
    t--;
    document.getElementById('prog-bar').style.width = t + '%';
    if (t <= 0) { clearInterval(qTimer); checkAns(idx, -1, null); }
  }, 200);
}

function checkAns(qi, chosen, el) {
  clearInterval(qTimer);
  const cor = questions[qi].c;
  const ov  = document.getElementById('overlay');
  const oic = document.getElementById('overlay-icon');
  const osg = document.getElementById('overlay-svg');
  ov.style.display = 'flex';

  if (chosen === cor) {
    if (el) el.classList.add('correct');
    oic.className = 'overlay-icon ok';
    osg.setAttribute('stroke-width','3');
    osg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    document.getElementById('snd-win').play().catch(()=>{});
  } else {
    if (el) el.classList.add('wrong');
    document.querySelectorAll('.opt')[cor]?.classList.add('correct');
    oic.className = 'overlay-icon fail';
    osg.setAttribute('stroke-width','3');
    osg.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    document.getElementById('snd-fail').play().catch(()=>{});
  }

  done.add(qi);
  currentPlayer = null;
  document.querySelectorAll('.q-sq').forEach(s => s.classList.remove('active'));

  setTimeout(() => {
    ov.style.display = 'none';
    if (done.size >= 16) {
      showSlide('s-win');
      document.getElementById('win-title').textContent = 'انتهت اللعبة! شكراً للجميع';
    } else {
      showSlide('s-map');
      setPicked(null);
      buildGrid();
    }
  }, 1700);
}

function showSlide(id) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ========== INIT ========== */
async function init() {
  if (sb) {
    try {
      const {data:e} = await sb.from('employees').select('name');
      if (e?.length) employees = e.map(r => r.name);

      const {data:q} = await sb.from('game_questions').select('*').order('id',{ascending:true});
      if (q?.length) questions = q.map(r => ({q: r.question, a: r.options, c: r.correct_index}));
    } catch(err) { console.error('Supabase:', err); }
  }
  buildWheel();
  buildGrid();
}

window.addEventListener('DOMContentLoaded', init);
</script>
