<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي التخطيط الاستراتيجي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: #f0f7ff;
            background-image: url('https://raw.githubusercontent.com/imarvam/smo-gathering/main/strategic_planning_modern_bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .game-container {
            width: 90%; max-width: 900px; height: 80vh;
            background: rgba(255, 255, 255, 0.98); border-radius: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .slide { display: none; width: 100%; height: 100%; padding: 40px; flex-direction: column; align-items: center; justify-content: center; animation: slideUp 0.4s ease; }
        .slide.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Modern Grid */
        .grid-ui {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
            width: 100%; max-width: 600px;
        }
        .q-button {
            aspect-ratio: 1; background: #fff; border: 4px solid #00bcd4; border-radius: 18px;
            font-size: 2.2rem; font-weight: 800; color: #00838f; cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 0 #0097a7; text-shadow: 1px 1px 0 #fff;
        }
        .q-button:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #0097a7; background: #e0f7fa; }
        .q-button:active { transform: translateY(5px); box-shadow: 0 2px 0 #0097a7; }
        .q-button.disabled { background: #cfd8dc; border-color: #90a4ae; color: #607d8b; box-shadow: 0 4px 0 #78909c; cursor: not-allowed; transform: none; }

        /* Timer */
        .progress-box { width: 100%; height: 12px; background: #e0e0e0; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { width: 100%; height: 100%; background: #00bcd4; transition: width 0.5s linear; }

        .question-h { font-size: 2.5rem; color: #1a237e; text-align: center; margin-bottom: 40px; line-height: 1.3; }
        .opts-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .opt-item {
            padding: 22px; background: #f5f5f5; border: 2px solid #e0e0e0; border-radius: 15px;
            font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: 0.2s; color: #37474f;
        }
        .opt-item:hover { background: #e3f2fd; border-color: #2196f3; color: #0d47a1; }
        .opt-item.correct { background: #c8e6c9; border-color: #4caf50; color: #1b5e20; }
        .opt-item.incorrect { background: #ffcdd2; border-color: #f44336; color: #b71c1c; }

        .team-tag { padding: 8px 25px; border-radius: 20px; font-weight: 800; margin-bottom: 20px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .btn-ready { padding: 18px 50px; background: #00bcd4; color: white; border: none; border-radius: 15px; font-size: 1.6rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #0097a7; }
        .btn-ready:hover { background: #26c6da; }

        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; font-size:6rem; z-index:100; backdrop-filter: blur(3px); }

        /* Wheel & Grid Layout */
        .game-layout {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 20px;
            gap: 40px;
            align-items: center;
        }

        .wheel-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .grid-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Spinning Wheel CSS */
        .wheel-container {
            width: 350px;
            height: 350px;
            position: relative;
            border-radius: 50%;
            border: 8px solid #1a237e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            background: #fff;
        }

        #wheel {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #d81b60;
            z-index: 10;
        }

        .segment {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: 50% 50%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #1a237e;
        }

        .spin-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #d81b60;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(216, 27, 96, 0.3);
            transition: 0.2s;
        }
        .spin-btn:hover { background: #ad1457; transform: scale(1.05); }
        .spin-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        .picked-name {
            margin-top: 15px;
            font-size: 1.5rem;
            font-weight: 800;
            color: #d81b60;
            height: 2rem;
        }

        .grid-ui {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        .q-square {
            aspect-ratio: 1;
            background: #fff;
            border: 3px solid #1a237e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a237e;
            cursor: pointer;
            transition: 0.3s;
        }
        .q-square:hover { transform: translateY(-5px); background: #e8eaf6; }
        .q-square.disabled { background: #eee; border-color: #bbb; color: #bbb; cursor: not-allowed; pointer-events: none; }
        .q-square.active { border-color: #d81b60; color: #d81b60; box-shadow: 0 0 15px rgba(216, 27, 96, 0.2); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="game-container">
        <div id="s-start" class="slide active">
            <h1 style="font-size: 4rem; color: #1a237e; margin-bottom: 20px;">🏆 التحدي الاستراتيجي</h1>
            <p style="font-size: 1.4rem; color: #546e7a; margin-bottom: 40px;">فريق التخطيط ضد فريق إدارة المخاطر</p>
            <button class="btn-ready" onclick="goMap()">دخول اللعبة</button>
        </div>

        <div id="s-map" class="slide">
            <div class="game-layout">
                <!-- Wheel Section (Right) -->
                <div class="wheel-section">
                    <div class="wheel-pointer"></div>
                    <div class="wheel-container">
                        <div id="wheel"></div>
                    </div>
                    <button id="spin-btn" class="spin-btn" onclick="spinWheel()">اضغط للدوران 🎡</button>
                    <div id="picked-display" class="picked-name"></div>
                </div>

                <!-- Grid Section (Left) -->
                <div class="grid-section">
                    <h2 style="color: #1a237e; margin-bottom: 20px;">اختر سؤالاً 🧩</h2>
                    <div id="grid-list" class="grid-ui"></div>
                </div>
            </div>
        </div>

        <div id="s-q" class="slide">
            <div class="progress-box"><div id="p-bar" class="progress-bar"></div></div>
            <div id="t-name" class="team-tag"></div>
            <div id="q-val" class="question-h"></div>
            <div id="o-list" class="opts-box"></div>
        </div>

        <div id="s-win" class="slide">
            <h1 id="win-msg" style="font-size: 3.5rem; text-align: center; color: #1a237e;"></h1>
            <div style="font-size: 10rem; margin: 30px 0;">🎉</div>
            <button class="btn-ready" onclick="location.reload()">لعب مرة أخرى</button>
        </div>

        <div id="msg-box" class="overlay"></div>
    </div>

    <!-- Clearer Game Sounds -->
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-fail" src="https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://peppyvyilwbiynvzjffk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlcHB5dnlpbHdiaXludnpqZmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDYwMzIsImV4cCI6MjA5MDg4MjAzMn0.CgtFQE1HfxxF5lMhxrCNzKRCr8M-BMMwj1jOwbVPsuw'; // اتركها كما هي حالياً وسيتم ربطها عبر Vercel
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        let dataSet = [
            {q: "ما هو الهدف الأساسي من التخطيط الاستراتيجي؟", a: ["تحديد الاتجاه المستقبلي للمنظمة", "إصدار تقارير شهرية", "الإنفاق العشوائي", "تقليل الموظفين"], c: 0},
            {q: "كيف نتعامل مع تعطل نظام البيانات؟", a: ["نأمل أن لا يحدث", "خطة طوارئ مسبقة", "نستدعي الفني لاحقاً", "نغلق المكتب"], c: 1},
            {q: "أي من هذه مكونات الخطة الاستراتيجية؟", a: ["الرؤية والرسالة والأهداف", "أحلام عشوائية", "الميزانية فقط", "تقليد المنافسين"], c: 0},
            {q: "ما أفضل ممارسة لضمان استمرارية العمل؟", a: ["اختبار البدائل بانتظام", "كتابة الخطة ونسيانها", "الاعتماد على الحظ", "توظيف شخص واحد"], c: 0},
            {q: "كم مرة يجب مراجعة الخطة؟", a: ["سنوياً أو عند تغييرات كبرى", "كل 5 سنوات", "لا داعي للمراجعة", "كلما تذكرنا"], c: 0},
            {q: "ما أخطر سيناريو يواجه الأعمال؟", a: ["فقدان القيادة والبيانات معاً", "انتهاء القهوة", "موظف في إجازة", "اجتماع مطول"], c: 0},
            {q: "تحديات تنفيذ الاستراتيجية؟", a: ["قلة الموارد ومقاومة التغيير", "المال فقط", "الموظفون فقط", "لا توجد تحديات"], c: 0},
            {q: "موظف أساسي ترك الشركة فجأة؟", a: ["نقل المعرفة والتدريب المسبق", "نبحث لاحقاً", "ننتظر", "لا يوجد موظف أساسي"], c: 0},
            {q: "بما تتمايز الشركات الناجحة؟", a: ["التنبؤ والتكيف والقيادة", "الحظ", "تجنب التغيير", "النسخ"], c: 0},
            {q: "خطأ في بيانات مالية أساسية؟", a: ["إبلاغ الإدارة والتحقيق فوراً", "تجاهلها", "إخبار صديق", "انتظار نهاية السنة"], c: 0},
            {q: "مقر منظمة التعاون الإسلامي؟", a: ["جدة", "القاهرة", "أبوظبي", "عمان"], c: 0},
            {q: "الشركات التي لا تخطط؟", a: ["تخطط للفشل", "تعيش اللحظة", "أكثر سعادة", "تعتمد على النجوم"], c: 0},
            {q: "عدد دول مجلس التعاون؟", a: ["6", "5", "7", "4"], c: 0},
            {q: "كم اجتماعاً استغرقت هذه اللعبة؟", a: ["أكثر من اللازم!", "واحد", "بالصدفة", "لم نتفق"], c: 0},
            {q: "سؤال إضافي 1 (يمكنك تعديله لاحقاً)", a: ["خيار 1", "خيار 2", "خيار 3", "خيار 4"], c: 0},
            {q: "سؤال إضافي 2 (يمكنك تعديله لاحقاً)", a: ["خيار 1", "خيار 2", "خيار 3", "خيار 4"], c: 0}
        ];

        async function loadQuestions() {
            if (!supabase || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY') return;
            try {
                const { data, error } = await supabase.from('game_questions').select('*').order('id', { ascending: true });
                if (data && data.length > 0) {
                    dataSet = data.map(item => ({
                        q: item.question,
                        a: item.options,
                        c: item.correct_index
                    }));
                }
            } catch (err) {
                console.error("Error fetching questions:", err);
            }
        }

        // Load questions on start
        loadQuestions();

        let employees = [
            "عائشة الكواري", "شريفة المنصوري", "ريم المحمد", "مريم القوز", "ندى اليامي",
            "ياسمين العجي", "لولوه آل ثاني", "رامي أبو زيتون", "وصال العنزي", "فاطمة الكبيسي",
            "عائشة الكعبي", "مريم الغانم", "المها المالكي", "موضي الكواري", "نورة السويدي"
        ];

        let playedPlayers = new Set();
        let currentRotation = 0;
        let isSpinning = false;
        let selectedPlayer = null;

        async function loadData() {
            // Load Employees from Supabase
            if (supabase && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY') {
                const { data: empData } = await supabase.from('employees').select('name');
                if (empData && empData.length > 0) employees = empData.map(e => e.name);

                // Load Questions
                const { data: qData } = await supabase.from('game_questions').select('*').order('id', { ascending: true });
                if (qData && qData.length > 0) {
                    dataSet = qData.map(item => ({
                        q: item.question,
                        a: item.options,
                        c: item.correct_index
                    }));
                }
            }
            initWheel();
            initGrid();
        }

        function initWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            const angle = 360 / employees.length;
            const colors = ['#e3f2fd', '#fce4ec', '#f3e5f5', '#efebe9', '#f1f8e9'];

            employees.forEach((name, i) => {
                const seg = document.createElement('div');
                seg.className = 'segment';
                seg.style.transform = `rotate(${i * angle}deg)`;
                seg.innerHTML = `<span style="transform: rotate(${-angle/2}deg)">${name}</span>`;
                seg.style.background = `conic-gradient(from 0deg at 50% 50%, ${colors[i % colors.length]} ${angle}deg, transparent ${angle}deg)`;
                // Alternative styling for segment visual
                seg.style.clipPath = `polygon(50% 50%, 50% 0%, ${50 + 50 * Math.tan((angle * Math.PI) / 180)}% 0%)`;
                if(angle > 90) seg.style.clipPath = 'none'; // fallback
                
                // Simpler visual for static HTML
                seg.style.background = 'transparent';
                const text = document.createElement('div');
                text.textContent = name;
                text.style.position = 'absolute';
                text.style.right = '10px';
                text.style.transform = `rotate(${angle/2}deg)`;
                seg.appendChild(text);

                // Divider line
                const line = document.createElement('div');
                line.style.position = 'absolute';
                line.style.width = '50%';
                line.style.height = '2px';
                line.style.background = '#1a237e22';
                line.style.top = '50%';
                line.style.left = '50%';
                line.style.transformOrigin = '0% 50%';
                wheel.appendChild(line);

                wheel.appendChild(seg);
            });
        }

        function initGrid() {
            const g = document.getElementById('grid-list');
            g.innerHTML = '';
            for(let i=1; i<=16; i++) {
                const b = document.createElement('div');
                b.className = 'q-square' + (done.has(i-1) ? ' disabled' : '');
                b.textContent = i;
                if(!done.has(i-1)) {
                    b.onclick = () => {
                        if(!selectedPlayer) {
                            alert("يرجى تدوير العجلة لاختيار الموظف أولاً!");
                            return;
                        }
                        showQ(i-1);
                    }
                }
                g.appendChild(b);
            }
        }

        function spinWheel() {
            if (isSpinning || playedPlayers.size === employees.length) return;
            
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('picked-display').textContent = "جاري الاختيار...";

            const availableIndices = employees.map((_, i) => i).filter(i => !playedPlayers.has(i));
            if (availableIndices.length === 0) {
                alert("تم اختيار جميع الموظفين!");
                return;
            }

            const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            const anglePerSegment = 360 / employees.length;
            
            // Calculate final rotation
            // We want the winner segment to be at the top (270 degrees usually in CSS transform)
            // But our wheel segments start at 0. 
            const targetAngle = 360 - (randomIndex * anglePerSegment) - (anglePerSegment / 2);
            const extraSpins = (5 + Math.floor(Math.random() * 5)) * 360;
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360));

            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                selectedPlayer = employees[randomIndex];
                playedPlayers.add(randomIndex);
                document.getElementById('picked-display').textContent = "الدور على: " + selectedPlayer;
                document.getElementById('spin-btn').disabled = false;
                // Highlight that grid is ready
                document.querySelectorAll('.q-square:not(.disabled)').forEach(s => s.classList.add('active'));
            }, 4100);
        }

        function goMap() {
            sd('s-map');
            initGrid();
        }

        function sd(id) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showQ(idx) {
            sd('s-q');
            const tag = document.getElementById('t-name');
            tag.textContent = "الموظف: " + selectedPlayer;
            tag.style.background = "#e8eaf6";
            tag.style.color = "#1a237e";

            document.getElementById('q-val').textContent = dataSet[idx].q;
            const ol = document.getElementById('o-list');
            ol.innerHTML = '';
            dataSet[idx].a.forEach((t, i) => {
                const btn = document.createElement('div');
                btn.className = 'opt-item';
                btn.textContent = t;
                btn.onclick = () => verify(idx, i, btn);
                ol.appendChild(btn);
            });

            let t = 100;
            const bar = document.getElementById('p-bar');
            clearInterval(qTimer);
            qTimer = setInterval(() => {
                t -= 1;
                bar.style.width = t + '%';
                if(t <= 0) { clearInterval(qTimer); verify(idx, -1); }
            }, 200);
        }

        function verify(qI, c, el) {
            clearInterval(qTimer);
            const cor = dataSet[qI].c;
            const m = document.getElementById('msg-box');
            m.style.display = 'flex';

            if(c === cor) {
                if(el) el.classList.add('correct');
                m.textContent = "✅"; m.style.color = "#4caf50";
                document.getElementById('snd-win').play();
            } else {
                if(el) el.classList.add('incorrect');
                m.textContent = "❌"; m.style.color = "#f44336";
                document.getElementById('snd-fail').play();
            }

            done.add(qI);
            selectedPlayer = null; // Reset for next spin
            document.querySelectorAll('.q-square').forEach(s => s.classList.remove('active'));

            setTimeout(() => {
                m.style.display = 'none';
                if(done.size === 16) {
                    sd('s-win');
                    document.getElementById('win-msg').textContent = "انتهت اللعبة! شكراً لجميع الموظفين.";
                } else goMap();
            }, 1200);
        }

        // Initial loading on window load
        window.onload = loadData;
    </script>
</body>
</html>
