<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي التخطيط الاستراتيجي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }

        body {
            min-height:100vh;
            display:flex; align-items:center; justify-content:center;
            background: linear-gradient(135deg,#b8dcf8 0%,#cdeaff 50%,#a8d4f5 100%);
            position:relative; overflow:hidden;
        }

        /* ====== BACKGROUND DECORATIONS ====== */
        .bg-deco {
            position:fixed; top:0; left:0; width:100%; height:100%;
            pointer-events:none; z-index:0; overflow:hidden;
        }
        .star { position:absolute; font-size:2rem; opacity:0.35; animation:floatS 6s ease-in-out infinite; }
        .compass-ico { position:absolute; font-size:3rem; opacity:0.3; animation:floatC 8s ease-in-out infinite; }
        .hands-ico { position:absolute; font-size:2.5rem; opacity:0.3; animation:floatH 7s ease-in-out infinite; }
        @keyframes floatS { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-18px) rotate(15deg);} }
        @keyframes floatC { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-14px) rotate(-10deg);} }
        @keyframes floatH { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }

        /* ====== GAME CARD ====== */
        .game-card {
            position:relative; z-index:1;
            width:96%; max-width:1180px; height:91vh;
            background:rgba(255,255,255,0.97);
            border-radius:28px;
            box-shadow:0 20px 70px rgba(30,100,200,0.18);
            border:2px solid rgba(160,210,255,0.5);
            display:flex; flex-direction:column;
            overflow:hidden;
        }

        /* ====== SLIDES ====== */
        .slide { display:none; width:100%; height:100%; animation:sldIn 0.35s ease; }
        .slide.active { display:flex; }
        @keyframes sldIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

        /* ====== MAIN LAYOUT: GRID | WHEEL ====== */
        #s-map {
            flex-direction:row;
            align-items:stretch;
        }

        /* --- LEFT PANEL: GRID --- */
        .panel-grid {
            flex:1;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            gap:18px;
            padding:30px 24px;
            border-left:2px solid #d0e8ff;
            background:linear-gradient(180deg,#f7fbff 0%,#edf5ff 100%);
        }
        .panel-grid h2 {
            font-size:1.5rem; font-weight:800; color:#1a237e;
        }

        .grid-ui {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:12px;
            width:100%; max-width:340px;
        }
        .q-sq {
            aspect-ratio:1;
            background:linear-gradient(145deg,#e8f1ff,#d0e4ff);
            border:3px solid #5b9fd6;
            border-radius:14px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.55rem; font-weight:800; color:#1a3a7e;
            cursor:pointer; transition:.22s;
            box-shadow:0 4px 12px rgba(58,123,213,.12);
            user-select:none;
        }
        .q-sq:hover { transform:translateY(-6px) scale(1.08); background:linear-gradient(145deg,#cde0ff,#b3d0f7); box-shadow:0 10px 22px rgba(58,123,213,.25); }
        .q-sq.active { border-color:#e53888; color:#c2185b; background:linear-gradient(145deg,#fce4ec,#f8bbd0); box-shadow:0 0 20px rgba(229,56,136,.4); animation:pls 1.1s infinite; }
        .q-sq.done { background:linear-gradient(145deg,#e8f5e9,#c8e6c9); border-color:#81c784; color:#2e7d32; pointer-events:none; font-size:1.3rem; }
        @keyframes pls { 0%,100%{box-shadow:0 0 14px rgba(229,56,136,.3);} 50%{box-shadow:0 0 26px rgba(229,56,136,.7);} }

        /* --- RIGHT PANEL: WHEEL --- */
        .panel-wheel {
            flex:1.1;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            gap:16px;
            padding:30px 24px;
            background:linear-gradient(180deg,#ffffff 0%,#f4f9ff 100%);
        }

        /* Wheel container */
        .wheel-wrap { position:relative; width:320px; height:320px; }

        .wheel-ptr {
            position:absolute; top:-20px; left:50%;
            transform:translateX(-50%);
            width:0; height:0;
            border-left:17px solid transparent;
            border-right:17px solid transparent;
            border-top:38px solid #e53888;
            z-index:20;
            filter:drop-shadow(0 4px 8px rgba(229,56,136,.5));
        }

        .wheel-border {
            position:absolute; top:0; left:0;
            width:320px; height:320px;
            border-radius:50%;
            border:10px solid #3a7bd5;
            box-shadow:0 8px 36px rgba(58,123,213,.28),inset 0 0 0 3px rgba(255,255,255,.4);
            pointer-events:none; z-index:5;
        }

        /* The SVG wheel lives here */
        .wheel-svg-wrap {
            width:300px; height:300px;
            position:absolute; top:10px; left:10px;
            border-radius:50%; overflow:hidden;
        }
        #wheelSVG { width:300px; height:300px; }

        .wheel-hub {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:34px; height:34px; border-radius:50%;
            background:radial-gradient(circle at 38% 38%,#fff 30%,#3a7bd5 100%);
            border:3px solid #1a237e;
            box-shadow:0 2px 10px rgba(0,0,0,.25);
            z-index:10;
        }

        .spin-btn {
            padding:14px 42px;
            background:linear-gradient(135deg,#e53888,#ad1457);
            color:#fff; border:none; border-radius:30px;
            font-size:1.25rem; font-weight:800; font-family:'Tajawal',sans-serif;
            cursor:pointer;
            box-shadow:0 6px 22px rgba(229,56,136,.42);
            transition:.2s;
        }
        .spin-btn:hover { transform:scale(1.06); box-shadow:0 10px 28px rgba(229,56,136,.55); }
        .spin-btn:disabled { background:linear-gradient(135deg,#ccc,#aaa); cursor:not-allowed; box-shadow:none; transform:none; }

        .picked-box {
            font-size:1.2rem; font-weight:800; color:#c2185b;
            text-align:center;
            background:linear-gradient(135deg,#fce4ec,#f8bbd0);
            padding:10px 26px; border-radius:14px;
            border:2px solid #f48fb1;
            min-width:230px;
            box-shadow:0 3px 12px rgba(194,24,91,.12);
        }
        .picked-box.idle { background:#f1f5fb; border-color:#c5d8f0; color:#9ab; font-size:1rem; font-weight:500; }

        /* ====== QUESTION SLIDE ====== */
        #s-q {
            flex-direction:column;
            align-items:center; justify-content:center;
            padding:40px 60px;
        }
        .prog-box { width:100%; max-width:720px; height:12px; background:#e0e0e0; border-radius:6px; margin-bottom:22px; overflow:hidden; }
        .prog-bar { height:100%; background:linear-gradient(90deg,#3a7bd5,#00bcd4); transition:width .2s linear; }
        .player-tag { padding:10px 28px; border-radius:24px; font-weight:800; margin-bottom:18px; font-size:1.15rem; background:#e8eaf6; color:#1a237e; box-shadow:0 4px 12px rgba(0,0,0,.06); }
        .q-text { font-size:2.1rem; color:#1a237e; text-align:center; margin-bottom:30px; line-height:1.5; max-width:750px; }
        .opts-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; max-width:720px; }
        .opt {
            padding:22px 16px; background:#f4f8ff; border:2px solid #c5d8f0;
            border-radius:15px; font-size:1.25rem; font-weight:700; cursor:pointer;
            transition:.2s; color:#37474f; text-align:center;
        }
        .opt:hover { background:#daeeff; border-color:#3a7bd5; color:#0d47a1; transform:translateY(-3px); }
        .opt.correct { background:#c8e6c9; border-color:#4caf50; color:#1b5e20; }
        .opt.wrong   { background:#ffcdd2; border-color:#f44336; color:#b71c1c; }

        /* ====== WIN SLIDE ====== */
        #s-win { flex-direction:column; align-items:center; justify-content:center; gap:20px; }
        .win-title { font-size:3rem; color:#1a237e; text-align:center; }
        .win-emoji { font-size:9rem; animation:bonce 1s infinite; }
        @keyframes bonce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-22px);} }
        .btn-play { padding:16px 50px; background:linear-gradient(135deg,#3a7bd5,#00bcd4); color:#fff; border:none; border-radius:16px; font-size:1.5rem; font-weight:800; font-family:'Tajawal',sans-serif; cursor:pointer; box-shadow:0 6px 22px rgba(58,123,213,.35); transition:.2s; }
        .btn-play:hover { transform:translateY(-3px); }

        /* ====== OVERLAY ====== */
        .overlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center; font-size:8rem; z-index:200; backdrop-filter:blur(4px); background:rgba(255,255,255,.3); }
    </style>

<script>

const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlcHB5dnlpbHdiaXludnpqZmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDYwMzIsImV4cCI6MjA5MDg4MjAzMn0.CgtFQE1HfxxF5lMhxrCNzKRCr8M-BMMwj1jOwbVPsuw';
const sb = (typeof window.supabase !== 'undefined') ? window.supabase.createClient(SB_URL, SB_KEY) : null;

/* =============================================
   DEFAULT DATA (fallback if Supabase is empty)
============================================= */
let employees = [
    "عائشة الكواري","شريفة المنصوري","ريم المحمد","مريم القوز","ندى اليامي",
    "ياسمين العجي","لولوه آل ثاني","رامي أبو زيتون","وصال العنزي","فاطمة الكبيسي",
    "عائشة الكعبي","مريم الغانم","المها المالكي","موضي الكواري","نورة السويدي","جوليان أبو خليل"

let questions = [
    {q:"ما هو الهدف الأساسي من التخطيط الاستراتيجي؟",a:["تحديد الاتجاه المستقبلي للمنظمة","إصدار تقارير شهرية","الإنفاق العشوائي","تقليل الموظفين"],c:0},

    {q:"ما أفضل ممارسة لضمان استمرارية العمل؟",a:["اختبار البدائل بانتظام","كتابة الخطة ونسيانها","الاعتماد على الحظ","توظيف شخص واحد"],c:0},
    {q:"كم مرة يجب مراجعة الخطة؟",a:["سنوياً أو عند تغييرات كبرى","كل 5 سنوات","لا داعي للمراجعة","كلما تذكرنا"],c:0},

    {q:"تحديات تنفيذ الاستراتيجية؟",a:["قلة الموارد ومقاومة التغيير","المال فقط","الموظفون فقط","لا توجد تحديات"],c:0},
    {q:"موظف أساسي ترك الشركة فجأة؟",a:["نقل المعرفة والتدريب المسبق","نبحث لاحقاً","ننتظر","لا يوجد موظف أساسي"],c:0},
    {q:"بما تتمايز المؤسسات الناجحة؟",a:["التنبؤ والتكيف والقيادة","الحظ","تجنب التغيير","النسخ"],c:0},
    {q:"خطأ في بيانات مالية أساسية؟",a:["إبلاغ الإدارة والتحقيق فوراً","تجاهلها","إخبار صديق","انتظار نهاية السنة"],c:0},
    {q:"مقر منظمة التعاون الإسلامي؟",a:["جدة","القاهرة","أبوظبي","عمان"],c:0},
    {q:"المؤسسات التي لا تخطط؟",a:["تخطط للفشل","تعيش اللحظة","أكثر سعادة","تعتمد على النجوم"],c:0},
    {q:"عدد دول مجلس التعاون؟",a:["6","5","7","4"],c:0},
    {q:"كم اجتماعاً استغرقت هذه اللعبة؟",a:["أكثر من اللازم!","واحد","بالصدفة","لم نتفق"],c:0},
    {q:"آخر مرحلة من مراحل التخطيط الاستراتيجي هي التنفيذ... هل هذا صحيح؟",a:["نعم، التنفيذ هو الأخير دائماً","خطأ، آخر مرحلة هي التقييم والمتابعة","نعم، لأن التنفيذ يسبق كل شيء","لا توجد مراحل محددة"],c:1},
    {q:"ما أول خطوة عند اكتشاف خطر جديد؟",a:["تقييم الخطر وإبلاغ الجهة المعنية فوراً","تجاهله وانتظار تطوره","إخبار الزملاء بشكل غير رسمي","إغلاق القسم المتأثر فوراً"],c:0}
];

/* =============================================
   WHEEL — SVG-BASED (no Canvas issues)
============================================= */
const PASTEL_FILL   = ['#ffd6e0','#ffdbb5','#fff9b5','#d4f5c4','#b5e8f7','#d6c8f7','#ffc8e0','#c8f0e8','#ffeab5','#c8ddf7','#f7c8f0','#c8f7d6','#f7e0c8','#c8c8f7','#e8f7c8'];
const PASTEL_STROKE = ['#f48fb1','#ffb74d','#ffd740','#81c784','#4fc3f7','#9575cd','#f06292','#4db6ac','#ffca28','#64b5f6','#ba68c8','#66bb6a','#ff8a65','#7986cb','#a5d6a7'];
const TEXT_COL      = ['#880e4f','#bf360c','#e65100','#1b5e20','#01579b','#4527a0','#880e4f','#00695c','#e65100','#0d47a1','#6a1b9a','#2e7d32','#bf360c','#283593','#33691e'];

let wheelAngle = 0;   // current rotation in degrees
let spinning   = false;
let rafId      = null;
let spinStart  = null;
const SPIN_DUR = 4500; // ms

function buildWheel() {
    const svg   = document.getElementById('wheelSVG');
    const n     = employees.length;
    const slice = 360 / n;
    const R     = 148;  // radius in viewBox units (viewBox is -150 to 150)

    svg.innerHTML = '';

    employees.forEach((name, i) => {
        const startDeg = i * slice;
        const endDeg   = startDeg + slice;
        const midDeg   = startDeg + slice / 2;

        const s = (d) => (d * Math.PI) / 180;
        const x1 = R * Math.cos(s(startDeg)), y1 = R * Math.sin(s(startDeg));
        const x2 = R * Math.cos(s(endDeg)),   y2 = R * Math.sin(s(endDeg));

        // Pie slice path
        const path = document.createElementNS('http://www.w3.org/2000/svg','path');
        const large = slice > 180 ? 1 : 0;
        path.setAttribute('d', `M0,0 L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z`);
        path.setAttribute('fill',   PASTEL_FILL[i % PASTEL_FILL.length]);
        path.setAttribute('stroke', PASTEL_STROKE[i % PASTEL_STROKE.length]);
        path.setAttribute('stroke-width','1.5');
        svg.appendChild(path);

        // Text — positioned at 65% of radius (r=96) along the midpoint angle
        const TR    = 90;
        const tx    = TR * Math.cos(s(midDeg));
        const ty    = TR * Math.sin(s(midDeg));

        const nameParts = splitName(name);
        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        g.setAttribute('transform', `translate(${tx},${ty}) rotate(${midDeg + 90})`);

        nameParts.forEach((part, pi) => {
            const t = document.createElementNS('http://www.w3.org/2000/svg','text');
            t.setAttribute('text-anchor','middle');
            t.setAttribute('dominant-baseline','middle');
            t.setAttribute('font-size', nameParts.length > 1 ? '9' : '10');
            t.setAttribute('font-weight','bold');
            t.setAttribute('font-family','Tajawal, Arial, sans-serif');
            t.setAttribute('fill', TEXT_COL[i % TEXT_COL.length]);
            t.setAttribute('y', (pi - (nameParts.length - 1) / 2) * 12 + '');
            t.textContent = part;
            g.appendChild(t);
        });
        svg.appendChild(g);
    });
}

function splitName(name) {
    const parts = name.trim().split(' ');
    if (parts.length === 1) return [name];
    if (parts.length === 2) return parts;
    return [parts[0], parts.slice(1).join(' ')];
}

function setWheelRotation(deg) {
    document.getElementById('wheelSVG').style.transform = `rotate(${deg}deg)`;
}

function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

function spinWheel() {
    if (spinning) return;
    const avail = employees.map((_,i)=>i).filter(i=>!played.has(i));
    if (avail.length === 0) { alert('تم اختيار جميع المشاركين!'); return; }

    spinning = true;
    currentPlayer = null;
    document.getElementById('spin-btn').disabled = true;
    const pb = document.getElementById('picked-box');
    pb.className = 'picked-box idle';
    pb.textContent = 'جاري الاختيار...';
    document.querySelectorAll('.q-sq:not(.done)').forEach(s=>s.classList.remove('active'));

    const pick  = avail[Math.floor(Math.random() * avail.length)];
    const n     = employees.length;
    const slice = 360 / n;

    // We want segment `pick` to sit under the TOP pointer.
    // SVG starts at angle 0 = right (3 o'clock). Pointer is at TOP = -90deg (or 270).
    // After rotation `wheelAngle`, segment `pick` center is at:
    //   (pick * slice + slice/2) + wheelAngle
    // We want that to equal 270 (pointer = top = -90 = 270).
    const segCenter = pick * slice + slice / 2;
    const extra     = (6 + Math.floor(Math.random() * 4)) * 360;
    const needed    = ((270 - segCenter) % 360 + 360) % 360;
    const diff      = needed - (wheelAngle % 360);
    const normDiff  = ((diff % 360) + 360) % 360;

    const startAngle  = wheelAngle;
    const targetAngle = wheelAngle + extra + normDiff;

    spinStart = null;
    function animate(ts) {
        if (!spinStart) spinStart = ts;
        const elapsed  = ts - spinStart;
        const progress = Math.min(elapsed / SPIN_DUR, 1);
        const now      = startAngle + (targetAngle - startAngle) * easeOut(progress);
        setWheelRotation(now);

        if (progress < 1) {
            rafId = requestAnimationFrame(animate);
        } else {
            wheelAngle = targetAngle;
            spinning   = false;
            currentPlayer = employees[pick];
            played.add(pick);

            const pb2 = document.getElementById('picked-box');
            pb2.className = 'picked-box';
            pb2.textContent = '🎯 الدور على: ' + currentPlayer;
            document.getElementById('spin-btn').disabled = false;
            document.querySelectorAll('.q-sq:not(.done)').forEach(s=>s.classList.add('active'));
        }
    }
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(animate);
}

/* =============================================
   GRID
============================================= */
let done          = new Set();
let played        = new Set();
let currentPlayer = null;
let qTimer        = null;

function buildGrid() {
    const g = document.getElementById('grid-list');
    g.innerHTML = '';
    for (let i = 1; i <= 16; i++) {
        const b = document.createElement('div');
        if (done.has(i-1)) {
            b.className = 'q-sq done';
            b.textContent = '✓';
        } else {
            b.className = 'q-sq' + (currentPlayer ? ' active' : '');
            b.textContent = i;
            b.onclick = () => {
                if (!currentPlayer) { alert('دوّر العجلة أولاً لاختيار مشارك!'); return; }
                openQuestion(i-1);
            };
        }
        g.appendChild(b);
    }
}

/* =============================================
   QUESTION
============================================= */
function openQuestion(idx) {
    showSlide('s-q');
    document.getElementById('player-tag').textContent = '👤 ' + currentPlayer;
    document.getElementById('q-text').textContent     = questions[idx].q;

    const og = document.getElementById('opts-grid');
    og.innerHTML = '';
    questions[idx].a.forEach((txt, i) => {
        const d = document.createElement('div');
        d.className   = 'opt';
        d.textContent = txt;
        d.onclick     = () => checkAnswer(idx, i, d);
        og.appendChild(d);
    });

    let t = 100;
    document.getElementById('prog-bar').style.width = '100%';
    clearInterval(qTimer);
    qTimer = setInterval(() => {
        t--;
        document.getElementById('prog-bar').style.width = t + '%';
        if (t <= 0) { clearInterval(qTimer); checkAnswer(idx, -1, null); }
    }, 200);
}

function checkAnswer(qi, chosen, el) {
    clearInterval(qTimer);
    const correct = questions[qi].c;
    const ov      = document.getElementById('overlay');
    ov.style.display = 'flex';

    if (chosen === correct) {
        if (el) el.classList.add('correct');
        ov.textContent = '✅'; ov.style.color = '#4caf50';
        document.getElementById('snd-win').play().catch(()=>{});
    } else {
        if (el) el.classList.add('wrong');
        const opts = document.querySelectorAll('.opt');
        if (opts[correct]) opts[correct].classList.add('correct');
        ov.textContent = '❌'; ov.style.color = '#f44336';
        document.getElementById('snd-fail').play().catch(()=>{});
    }

    done.add(qi);
    currentPlayer = null;
    document.querySelectorAll('.q-sq').forEach(s=>s.classList.remove('active'));

    setTimeout(() => {
        ov.style.display = 'none';
        if (done.size >= 16) {
            showSlide('s-win');
            document.getElementById('win-title').textContent = 'انتهت اللعبة! شكراً للجميع 🏆';
        } else {
            showSlide('s-map');
            buildGrid();
        }
    }, 1600);
}

/* =============================================
   HELPERS
============================================= */
function showSlide(id) {
    document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* =============================================
   LOAD DATA FROM SUPABASE THEN INIT
============================================= */
async function init() {
    if (sb) {
        try {
            // Load employees
            const { data: emp, error: eErr } = await sb.from('employees').select('name');
            if (!eErr && emp && emp.length > 0) {
                employees = emp.map(r => r.name);
                console.log('✅ Loaded employees:', employees.length);
            } else {
                console.warn('employees not loaded, using defaults. Error:', eErr);
            }

            // Load questions
            const { data: qs, error: qErr } = await sb
                .from('game_questions')
                .select('*')
                .order('id', { ascending: true });
            if (!qErr && qs && qs.length > 0) {
                questions = qs.map(r => ({
                    q: r.question,
                    a: r.options,
                    c: r.correct_index
                }));
                console.log('✅ Loaded questions:', questions.length);
            } else {
                console.warn('questions not loaded, using defaults. Error:', qErr);
            }
        } catch (err) {
            console.error('Supabase error:', err);
        }
    }
    // Build UI after data is ready
    buildWheel();
    buildGrid();
}

window.addEventListener('DOMContentLoaded', init);
</script>
