<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي التخطيط الاستراتيجي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: #f0f7ff;
            background-image: url('https://raw.githubusercontent.com/imarvam/smo-gathering/main/strategic_planning_modern_bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .game-container {
            width: 90%; max-width: 900px; height: 80vh;
            background: rgba(255, 255, 255, 0.98); border-radius: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .slide { display: none; width: 100%; height: 100%; padding: 40px; flex-direction: column; align-items: center; justify-content: center; animation: slideUp 0.4s ease; }
        .slide.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Modern Grid */
        .grid-ui {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
            width: 100%; max-width: 600px;
        }
        .q-button {
            aspect-ratio: 1; background: #fff; border: 4px solid #00bcd4; border-radius: 18px;
            font-size: 2.2rem; font-weight: 800; color: #00838f; cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 0 #0097a7; text-shadow: 1px 1px 0 #fff;
        }
        .q-button:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #0097a7; background: #e0f7fa; }
        .q-button:active { transform: translateY(5px); box-shadow: 0 2px 0 #0097a7; }
        .q-button.disabled { background: #cfd8dc; border-color: #90a4ae; color: #607d8b; box-shadow: 0 4px 0 #78909c; cursor: not-allowed; transform: none; }

        /* Timer */
        .progress-box { width: 100%; height: 12px; background: #e0e0e0; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { width: 100%; height: 100%; background: #00bcd4; transition: width 0.5s linear; }

        .question-h { font-size: 2.5rem; color: #1a237e; text-align: center; margin-bottom: 40px; line-height: 1.3; }
        .opts-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .opt-item {
            padding: 22px; background: #f5f5f5; border: 2px solid #e0e0e0; border-radius: 15px;
            font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: 0.2s; color: #37474f;
        }
        .opt-item:hover { background: #e3f2fd; border-color: #2196f3; color: #0d47a1; }
        .opt-item.correct { background: #c8e6c9; border-color: #4caf50; color: #1b5e20; }
        .opt-item.incorrect { background: #ffcdd2; border-color: #f44336; color: #b71c1c; }

        .team-tag { padding: 8px 25px; border-radius: 20px; font-weight: 800; margin-bottom: 20px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .btn-ready { padding: 18px 50px; background: #00bcd4; color: white; border: none; border-radius: 15px; font-size: 1.6rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #0097a7; }
        .btn-ready:hover { background: #26c6da; }

        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; font-size:6rem; z-index:100; backdrop-filter: blur(3px); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="game-container">
        <div id="s-start" class="slide active">
            <h1 style="font-size: 4rem; color: #1a237e; margin-bottom: 20px;">🏆 التحدي الاستراتيجي</h1>
            <p style="font-size: 1.4rem; color: #546e7a; margin-bottom: 40px;">فريق التخطيط ضد فريق إدارة المخاطر</p>
            <button class="btn-ready" onclick="goMap()">دخول اللعبة</button>
        </div>

        <div id="s-map" class="slide">
            <h2 style="color: #00838f; margin-bottom: 30px; font-size: 2.2rem;">اختر رقم التحدي</h2>
            <div id="grid-list" class="grid-ui"></div>
            <div style="margin-top: 30px; display: flex; gap: 40px;">
                <div style="text-align: center;"><div style="color: #00838f; font-weight: bold;">التخطيط</div><div id="v1" style="font-size: 3rem; font-weight: 900; color: #00acc1;">0</div></div>
                <div style="text-align: center;"><div style="color: #ec407a; font-weight: bold;">المخاطر</div><div id="v2" style="font-size: 3rem; font-weight: 900; color: #d81b60;">0</div></div>
            </div>
        </div>

        <div id="s-q" class="slide">
            <div class="progress-box"><div id="p-bar" class="progress-bar"></div></div>
            <div id="t-name" class="team-tag"></div>
            <div id="q-val" class="question-h"></div>
            <div id="o-list" class="opts-box"></div>
        </div>

        <div id="s-win" class="slide">
            <h1 id="win-msg" style="font-size: 3.5rem; text-align: center; color: #1a237e;"></h1>
            <div style="font-size: 10rem; margin: 30px 0;">🎉</div>
            <button class="btn-ready" onclick="location.reload()">لعب مرة أخرى</button>
        </div>

        <div id="msg-box" class="overlay"></div>
    </div>

    <!-- Clearer Game Sounds -->
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-fail" src="https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://peppyvyilwbiynvzjffk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlcHB5dnlpbHdiaXludnpqZmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDYwMzIsImV4cCI6MjA5MDg4MjAzMn0.CgtFQE1HfxxF5lMhxrCNzKRCr8M-BMMwj1jOwbVPsuw'; // اتركها كما هي حالياً وسيتم ربطها عبر Vercel
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        let dataSet = [
            {q: "ما هو الهدف الأساسي من التخطيط الاستراتيجي؟", a: ["تحديد الاتجاه المستقبلي للمنظمة", "إصدار تقارير شهرية", "الإنفاق العشوائي", "تقليل الموظفين"], c: 0},
            {q: "كيف نتعامل مع تعطل نظام البيانات؟", a: ["نأمل أن لا يحدث", "خطة طوارئ مسبقة", "نستدعي الفني لاحقاً", "نغلق المكتب"], c: 1},
            {q: "أي من هذه مكونات الخطة الاستراتيجية؟", a: ["الرؤية والرسالة والأهداف", "أحلام عشوائية", "الميزانية فقط", "تقليد المنافسين"], c: 0},
            {q: "ما أفضل ممارسة لضمان استمرارية العمل؟", a: ["اختبار البدائل بانتظام", "كتابة الخطة ونسيانها", "الاعتماد على الحظ", "توظيف شخص واحد"], c: 0},
            {q: "كم مرة يجب مراجعة الخطة؟", a: ["سنوياً أو عند تغييرات كبرى", "كل 5 سنوات", "لا داعي للمراجعة", "كلما تذكرنا"], c: 0},
            {q: "ما أخطر سيناريو يواجه الأعمال؟", a: ["فقدان القيادة والبيانات معاً", "انتهاء القهوة", "موظف في إجازة", "اجتماع مطول"], c: 0},
            {q: "تحديات تنفيذ الاستراتيجية؟", a: ["قلة الموارد ومقاومة التغيير", "المال فقط", "الموظفون فقط", "لا توجد تحديات"], c: 0},
            {q: "موظف أساسي ترك الشركة فجأة؟", a: ["نقل المعرفة والتدريب المسبق", "نبحث لاحقاً", "ننتظر", "لا يوجد موظف أساسي"], c: 0},
            {q: "بما تتمايز الشركات الناجحة؟", a: ["التنبؤ والتكيف والقيادة", "الحظ", "تجنب التغيير", "النسخ"], c: 0},
            {q: "خطأ في بيانات مالية أساسية؟", a: ["إبلاغ الإدارة والتحقيق فوراً", "تجاهلها", "إخبار صديق", "انتظار نهاية السنة"], c: 0},
            {q: "مقر منظمة التعاون الإسلامي؟", a: ["جدة", "القاهرة", "أبوظبي", "عمان"], c: 0},
            {q: "الشركات التي لا تخطط؟", a: ["تخطط للفشل", "تعيش اللحظة", "أكثر سعادة", "تعتمد على النجوم"], c: 0},
            {q: "عدد دول مجلس التعاون؟", a: ["6", "5", "7", "4"], c: 0},
            {q: "كم اجتماعاً استغرقت هذه اللعبة؟", a: ["أكثر من اللازم!", "واحد", "بالصدفة", "لم نتفق"], c: 0},
            {q: "سؤال إضافي 1 (يمكنك تعديله لاحقاً)", a: ["خيار 1", "خيار 2", "خيار 3", "خيار 4"], c: 0},
            {q: "سؤال إضافي 2 (يمكنك تعديله لاحقاً)", a: ["خيار 1", "خيار 2", "خيار 3", "خيار 4"], c: 0}
        ];

        async function loadQuestions() {
            if (!supabase || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY') return;
            try {
                const { data, error } = await supabase.from('game_questions').select('*').order('id', { ascending: true });
                if (data && data.length > 0) {
                    dataSet = data.map(item => ({
                        q: item.question,
                        a: item.options,
                        c: item.correct_index
                    }));
                }
            } catch (err) {
                console.error("Error fetching questions:", err);
            }
        }

        // Load questions on start
        loadQuestions();

        let score1 = 0, score2 = 0;
        let done = new Set();
        let qTimer;

        function goMap() {
            sd('s-map');
            const g = document.getElementById('grid-list');
            g.innerHTML = '';
            for(let i=1; i<=16; i++) {
                const b = document.createElement('button');
                b.className = 'q-button' + (done.has(i-1) ? ' disabled' : '');
                b.textContent = i;
                if(!done.has(i-1)) b.onclick = () => showQ(i-1);
                g.appendChild(b);
            }
        }

        function sd(id) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showQ(idx) {
            sd('s-q');
            const isT1 = (done.size % 2 === 0);
            const tag = document.getElementById('t-name');
            tag.textContent = isT1 ? "فريق التخطيط 🎯" : "فريق المخاطر 🛡️";
            tag.style.background = isT1 ? "#e0f7fa" : "#fce4ec";
            tag.style.color = isT1 ? "#00838f" : "#d81b60";

            document.getElementById('q-val').textContent = dataSet[idx].q;
            const ol = document.getElementById('o-list');
            ol.innerHTML = '';
            dataSet[idx].a.forEach((t, i) => {
                const btn = document.createElement('div');
                btn.className = 'opt-item';
                btn.textContent = t;
                btn.onclick = () => verify(idx, i, btn);
                ol.appendChild(btn);
            });

            let t = 100;
            const bar = document.getElementById('p-bar');
            clearInterval(qTimer);
            qTimer = setInterval(() => {
                t -= 1;
                bar.style.width = t + '%';
                if(t <= 0) { clearInterval(qTimer); verify(idx, -1); }
            }, 200);
        }

        function verify(qI, c, el) {
            clearInterval(qTimer);
            const cor = dataSet[qI].c;
            const m = document.getElementById('msg-box');
            m.style.display = 'flex';
            const isT1 = (done.size % 2 === 0);

            if(c === cor) {
                if(el) el.classList.add('correct');
                m.textContent = "✅"; m.style.color = "#4caf50";
                document.getElementById('snd-win').play();
                if(isT1) score1++; else score2++;
            } else {
                if(el) el.classList.add('incorrect');
                m.textContent = "❌"; m.style.color = "#f44336";
                document.getElementById('snd-fail').play();
            }

            done.add(qI);
            document.getElementById('v1').textContent = score1;
            document.getElementById('v2').textContent = score2;

            setTimeout(() => {
                m.style.display = 'none';
                if(done.size === 16) {
                    sd('s-win');
                    const r = score1 > score2 ? "فريق التخطيط فاز بالتحدي!" : (score2 > score1 ? "فريق المخاطر فاز بالتحدي!" : "تعادل الفريقان!");
                    document.getElementById('win-msg').textContent = r;
                } else goMap();
            }, 1200);
        }
    </script>
</body>
</html>
