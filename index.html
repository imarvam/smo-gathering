<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>التحدي الاستراتيجي — SMO Gathering</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&display=swap');
:root{
  --cream:#f5f0eb; --white:#ffffff;
  --teal:#5ecfcc;  --teal-d:#3aaea9;
  --orange:#f5a04a; --orange-d:#e0862c;
  --pink:#f4a0b5;  --sky:#7dd3e8;
  --dark:#2d2d2d;  --mid:#6b7280;
  --r:24px; --shadow:0 20px 60px rgba(0,0,0,.10);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}

body{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(145deg,#f0ebe4 0%,#f7f2ed 50%,#edf5f5 100%);
  overflow:hidden; position:relative;
}

/* Soft doodle background dots */
.bg-dots{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.dot{position:absolute;border-radius:50%;opacity:.18;}

/* === CARD === */
.card{
  position:relative;z-index:1;
  width:97%;max-width:1220px;height:93vh;
  background:var(--white);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  border:1.5px solid rgba(94,207,204,.2);
  display:flex;flex-direction:column;
  overflow:hidden;
}
/* Colorful top strip */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--teal),var(--pink),var(--orange),var(--teal));
  background-size:200%;animation:rainbow 4s linear infinite;z-index:10;
}
@keyframes rainbow{0%{background-position:0%}100%{background-position:200%}}

/* === HEADER MASCOTS === */
.mascot-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px 8px;
  background:linear-gradient(135deg,#fdf8f4,#f0fafa);
  border-bottom:1.5px solid rgba(94,207,204,.15);
  flex-shrink:0;
}
.mascot-header .title-block{
  display:flex;flex-direction:column;
  align-items:flex-end;
}
.mascot-header h1{
  font-size:1.5rem;font-weight:900;color:var(--dark);letter-spacing:-.3px;
  line-height:1.2;
}
.mascot-header p{font-size:.9rem;color:var(--mid);font-weight:500;margin-top:2px;}
.mascot-header .chars{display:flex;align-items:flex-end;gap:6px;}

/* Music btn */
.music-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 18px;background:var(--teal);color:#fff;border:none;
  border-radius:50px;font-size:.9rem;font-weight:700;font-family:'Tajawal',sans-serif;
  cursor:pointer;box-shadow:0 4px 14px rgba(94,207,204,.4);
  transition:transform .2s,box-shadow .2s;
}
.music-btn:hover{transform:scale(1.05);box-shadow:0 6px 18px rgba(94,207,204,.5);}
.music-btn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === SLIDES === */
.slide{display:none;width:100%;flex:1;overflow:hidden;animation:fadeUp .35s ease;}
.slide.active{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* === MAIN LAYOUT === */
#s-map{flex-direction:row;align-items:stretch;}

/* Panel label */
.panel-label{
  font-size:1.25rem;font-weight:800;color:var(--dark);
  padding-bottom:8px;border-bottom:3px solid var(--teal);
  margin-bottom:18px;align-self:center;
}

/* === WHEEL PANEL (right in RTL) === */
.pw{
  flex:1.15;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:20px 28px;
  background:linear-gradient(160deg,#fdf8f5 0%,#f0fcfb 100%);
  border-left:1.5px solid rgba(94,207,204,.2);
  position:relative;
}

.wheel-wrap{position:relative;width:320px;height:320px;}
.ptr{
  position:absolute;top:-28px;left:50%;transform:translateX(-50%);
  z-index:20;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));
}
.wheel-ring{
  position:absolute;inset:0;border-radius:50%;
  border:10px solid var(--dark);
  box-shadow:0 0 0 3px rgba(255,255,255,.8),0 10px 36px rgba(0,0,0,.15),inset 0 0 0 2px rgba(255,255,255,.3);
  pointer-events:none;z-index:5;
}
.wheel-ring::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:2px solid var(--teal);opacity:.6;
}
.wheel-svg-wrap{
  position:absolute;top:10px;left:10px;
  width:300px;height:300px;border-radius:50%;overflow:hidden;
}
#wheelSVG{width:300px;height:300px;display:block;}
.wheel-hub{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:36px;height:36px;border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#fff 25%,var(--teal-d) 100%);
  border:3px solid var(--dark);
  box-shadow:0 3px 12px rgba(0,0,0,.2);z-index:10;
}
.wheel-hub::after{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:11px;height:11px;background:var(--orange);
  clip-path:polygon(50% 0%,61%35%,98%35%,68%57%,79%91%,50%70%,21%91%,32%57%,2%35%,39%35%);
}

.spin-btn{
  position:relative;overflow:hidden;
  padding:14px 44px;
  background:linear-gradient(135deg,var(--orange),var(--orange-d));
  color:#fff;border:none;border-radius:50px;
  font-size:1.15rem;font-weight:800;font-family:'Tajawal',sans-serif;
  cursor:pointer;letter-spacing:.3px;
  box-shadow:0 6px 22px rgba(245,160,74,.4);
  transition:transform .2s,box-shadow .2s;
}
.spin-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.03);box-shadow:0 10px 30px rgba(245,160,74,.55);}
.spin-btn:disabled{background:linear-gradient(135deg,#d1d5db,#9ca3af);cursor:not-allowed;box-shadow:none;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);transform:scale(0);animation:rpl .6s linear;pointer-events:none;}
@keyframes rpl{to{transform:scale(4);opacity:0;}}

.picked-box{
  display:flex;align-items:center;gap:10px;
  padding:11px 26px;border-radius:16px;min-width:230px;
  justify-content:center;transition:all .3s;
}
.picked-box.idle{background:#f9f5f1;border:2px solid #e5dfd9;color:var(--mid);font-size:.9rem;font-weight:500;}
.picked-box.active{
  background:linear-gradient(135deg,#fdf0e8,#fde8d4);
  border:2px solid var(--orange);
  box-shadow:0 4px 16px rgba(245,160,74,.2);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.picked-box .pb-dot{width:9px;height:9px;border-radius:50%;background:var(--orange);animation:pulse2 1.5s infinite;}
@keyframes pulse2{0%,100%{transform:scale(1);}50%{transform:scale(1.5);opacity:.6;}}
.picked-box .pb-name{font-size:1.1rem;font-weight:800;color:var(--dark);}
@keyframes popIn{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}

/* === GRID PANEL (left in RTL) === */
.pg{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;padding:20px 28px;
  background:linear-gradient(160deg,#fff 0%,#fdf8f4 100%);
}
.grid-wrap{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:11px;width:100%;max-width:330px;
}
.q-sq{
  aspect-ratio:1;background:#fff;
  border:2px solid #e8dfd6;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:800;color:var(--dark);
  cursor:pointer;transition:all .22s;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  position:relative;overflow:hidden;user-select:none;
}
.q-sq::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.7),transparent);pointer-events:none;}
.q-sq:hover{transform:translateY(-6px) scale(1.07);border-color:var(--teal);background:linear-gradient(145deg,#edfafa,#d5f5f4);box-shadow:0 12px 24px rgba(94,207,204,.2);}
.q-sq.active{border-color:var(--orange);color:var(--orange-d);background:linear-gradient(145deg,#fff7ee,#fde8c8);box-shadow:0 0 22px rgba(245,160,74,.4);animation:glowQ 1.3s infinite;}
.q-sq.done{background:linear-gradient(145deg,#f0fdf4,#dcfce7);border-color:#86efac;color:#16a34a;pointer-events:none;font-size:.9rem;}
.q-sq.done svg{width:22px;height:22px;stroke:#16a34a;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
@keyframes glowQ{0%,100%{box-shadow:0 0 14px rgba(245,160,74,.3);}50%{box-shadow:0 0 28px rgba(245,160,74,.7);}}

/* === QUESTION SLIDE === */
#s-q{flex-direction:column;align-items:center;justify-content:center;padding:36px 60px;background:linear-gradient(160deg,#fdfaf8,#f0fafa);}
.prog-wrap{width:100%;max-width:740px;height:7px;background:#e5dfd9;border-radius:4px;margin-bottom:24px;overflow:hidden;}
.prog-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--teal),var(--sky));border-radius:4px;transition:width .2s linear;}
.player-chip{display:inline-flex;align-items:center;gap:10px;padding:10px 26px;border-radius:50px;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;font-weight:800;font-size:1rem;margin-bottom:24px;box-shadow:0 6px 18px rgba(94,207,204,.3);}
.chip-dot{width:8px;height:8px;border-radius:50%;background:#fff;opacity:.7;}
.q-text{font-size:1.95rem;color:var(--dark);text-align:center;line-height:1.6;max-width:760px;font-weight:700;margin-bottom:30px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:740px;}
.opt{padding:20px 18px;background:#fff;border:2px solid #e8dfd6;border-radius:18px;font-size:1.15rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--dark);text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.opt:hover{border-color:var(--teal);background:linear-gradient(135deg,#edfafa,#d5f5f4);transform:translateY(-3px);box-shadow:0 8px 18px rgba(94,207,204,.15);}
.opt.correct{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#4ade80;color:#15803d;}
.opt.wrong{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#f87171;color:#b91c1c;}

/* === WIN === */
#s-win{flex-direction:column;align-items:center;justify-content:center;gap:20px;background:linear-gradient(160deg,#fdfaf8,#f0fafa);}
.trophy-wrap{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange-d));display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(245,160,74,.45);animation:trophySway 2s ease infinite;}
.trophy-wrap svg{width:64px;height:64px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
@keyframes trophySway{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-16px) rotate(2deg);}}
.win-title{font-size:2.8rem;color:var(--dark);font-weight:900;text-align:center;}
.win-sub{font-size:1rem;color:var(--mid);text-align:center;}
.btn-replay{display:flex;align-items:center;gap:10px;padding:15px 48px;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;border:none;border-radius:50px;font-size:1.25rem;font-weight:800;font-family:'Tajawal',sans-serif;cursor:pointer;box-shadow:0 6px 22px rgba(94,207,204,.4);transition:all .2s;}
.btn-replay:hover{transform:translateY(-3px);}
.btn-replay svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}

/* === OVERLAY === */
.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);background:rgba(245,240,235,.35);}
.ov-icon{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both;}
.ov-icon.ok{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 16px 50px rgba(34,197,94,.45);}
.ov-icon.fail{background:linear-gradient(135deg,#f43f5e,#be123c);box-shadow:0 16px 50px rgba(244,63,94,.45);}
.ov-icon svg{width:72px;height:72px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}

/* Confetti */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden;}
.cf{position:absolute;top:-10px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

  <div id="overlay" class="overlay">

/* BG dots */

  const c=document.getElementById('bg-dots');
  const cols=['#f4a0b5','#7dd3e8','#f5a04a','#5ecfcc','#fbbf24'];
  for(let i=0;i<18;i++){

    d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};`;
    c.appendChild(d);
  }
})();

/* Music */
let musicOn=false,firstClick=false;
const bgm=document.getElementById('bg-music');bgm.volume=0.22;
document.addEventListener('click',()=>{if(!firstClick){firstClick=true;musicOn=true;bgm.play().then(()=>{document.getElementById('music-btn').style.background='#3aaea9';}).catch(()=>{});}},{once:true});
function toggleMusic(){
  musicOn=!musicOn;firstClick=true;
  const icon=document.getElementById('music-icon');
  if(musicOn){bgm.play().catch(()=>{});document.getElementById('music-btn').style.background='#3aaea9';icon.innerHTML='<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>';}
  else{bgm.pause();document.getElementById('music-btn').style.background='#f5a04a';icon.innerHTML='<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><line x1="2" y1="2" x2="22" y2="22" stroke="#fff" stroke-width="2"/>';}
}

/* Ripple */
function addRipple(b,e){const r=document.createElement('span');r.className='ripple';const rc=b.getBoundingClientRect(),s=Math.max(rc.width,rc.height);r.style.width=r.style.height=s+'px';r.style.left=(e.clientX-rc.left-s/2)+'px';r.style.top=(e.clientY-rc.top-s/2)+'px';b.appendChild(r);setTimeout(()=>r.remove(),650);}

/* Confetti */
function confetti(){const c=document.getElementById('confetti'),cols=['#5ecfcc','#f5a04a','#f4a0b5','#7dd3e8','#fbbf24','#2d2d2d'];for(let i=0;i<70;i++){const el=document.createElement('div');el.className='cf';const w=5+Math.random()*8,h=7+Math.random()*12,dur=1.5+Math.random()*2;el.style.cssText=`left:${Math.random()*100}vw;width:${w}px;height:${h}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${dur}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(el);setTimeout(()=>el.remove(),(dur+.6)*1000);}}

/* Wheel */
const FILLS=['#ffd6e0','#ffdbb5','#fff9b0','#c8f5e0','#b0e8f7','#d5c8f7','#ffc8df','#c8f0e8','#ffeab0','#c8dcf7','#f7c8f0','#c8f7d5','#f7e0c8','#c8c8f7','#e8f7c8','#ffe4b0'];
const STROKES=['#f48fb1','#fba85f','#fcd54f','#4dd87a','#38c6ed','#9575cd','#f06090','#3dcfb1','#fbc835','#5ba8f0','#c86cbe','#44c866','#f07844','#7080d5','#94d86c','#fba040'];
const TXTS=['#9d174d','#92400e','#78350f','#14532d','#0c4a6e','#4b2091','#831843','#134e4a','#713f12','#1e3a5f','#581c87','#14532d','#7c2d12','#283593','#365314','#7c2d12'];
let wheelRot=0,spinning=false,rafId=null,spinStart=null;
const SPIN_DUR=4600;
let done=new Set(),played=new Set(),curPlayer=null,qTimer=null;

function buildWheel(){
  const svg=document.getElementById('wheelSVG'),n=employees.length,deg=360/n;svg.innerHTML='';
  employees.forEach((name,i)=>{
    const a1=i*deg,a2=a1+deg,am=a1+deg/2,R=d=>d*Math.PI/180,r=147;
    const x1=r*Math.cos(R(a1)),y1=r*Math.sin(R(a1)),x2=r*Math.cos(R(a2)),y2=r*Math.sin(R(a2));
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M0,0 L${x1},${y1} A${r},${r} 0 ${deg>180?1:0},1 ${x2},${y2} Z`);
    path.setAttribute('fill',FILLS[i%FILLS.length]);path.setAttribute('stroke',STROKES[i%STROKES.length]);path.setAttribute('stroke-width','1.5');
    svg.appendChild(path);
    const TR=88,tx=TR*Math.cos(R(am)),ty=TR*Math.sin(R(am)),parts=splitName(name);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${tx},${ty}) rotate(${am+90})`);
    parts.forEach((p,pi)=>{const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');t.setAttribute('font-size',parts.length>1?'9':'10.5');t.setAttribute('font-weight','700');t.setAttribute('font-family','Tajawal,Arial,sans-serif');t.setAttribute('fill',TXTS[i%TXTS.length]);t.setAttribute('y',(pi-(parts.length-1)/2)*12+'');t.textContent=p;g.appendChild(t);});
    svg.appendChild(g);
  });
}
function splitName(n){const p=n.trim().split(' ');return p.length<=1?[n]:p.length===2?p:[p[0],p.slice(1).join(' ')];}
function easeOut(t){return 1-Math.pow(1-t,4);}

function spinWheel(event){
  if(spinning)return;
  const avail=employees.map((_,i)=>i).filter(i=>!played.has(i));
  if(!avail.length){alert('تم اختيار جميع المشاركين!');return;}
  if(event)addRipple(document.getElementById('spin-btn'),event);
  spinning=true;curPlayer=null;document.getElementById('spin-btn').disabled=true;
  setPicked(null,true);document.querySelectorAll('.q-sq:not(.done)').forEach(s=>s.classList.remove('active'));
  const snd=document.getElementById('snd-spin');snd.currentTime=0;snd.play().catch(()=>{});
  const pick=avail[Math.floor(Math.random()*avail.length)],n=employees.length,sd=360/n;
  const sm=pick*sd+sd/2,extra=(7+Math.floor(Math.random()*4))*360,needed=((270-sm)%360+360)%360;
  const diff=((needed-wheelRot%360)+360)%360,s0=wheelRot,target=wheelRot+extra+diff;
  spinStart=null;
  function animate(ts){
    if(!spinStart)spinStart=ts;
    const prog=Math.min((ts-spinStart)/SPIN_DUR,1),cur=s0+(target-s0)*easeOut(prog);
    document.getElementById('wheelSVG').style.transform=`rotate(${cur}deg)`;
    if(prog<1){rafId=requestAnimationFrame(animate);return;}
    wheelRot=target;spinning=false;curPlayer=employees[pick];played.add(pick);
    setPicked(curPlayer,false);document.getElementById('spin-btn').disabled=false;
    document.querySelectorAll('.q-sq:not(.done)').forEach(s=>s.classList.add('active'));
  }
  if(rafId)cancelAnimationFrame(rafId);rafId=requestAnimationFrame(animate);
}

function setPicked(name,loading){
  const box=document.getElementById('picked-box');
  if(loading){box.className='picked-box idle';box.innerHTML='<span>جاري الاختيار...</span>';}
  else if(!name){box.className='picked-box idle';box.innerHTML='<span>في انتظار الدوران</span>';}
  else{box.className='picked-box active';box.innerHTML=`<span class="pb-dot"></span><span class="pb-name">${name}</span>`;}
}

function buildGrid(){
  const g=document.getElementById('grid-list');g.innerHTML='';
  for(let i=1;i<=16;i++){
    const b=document.createElement('div');
    if(done.has(i-1)){b.className='q-sq done';b.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';}
    else{b.className='q-sq'+(curPlayer?' active':'');b.textContent=i;b.onclick=(e)=>{if(!curPlayer){alert('دوّر العجلة أولاً!');return;}addRipple(b,e);setTimeout(()=>openQ(i-1),100);};}
    g.appendChild(b);
  }
}

function openQ(idx){
  showSlide('s-q');document.getElementById('player-name').textContent=curPlayer;
  document.getElementById('q-text').textContent=questions[idx].q;document.getElementById('prog-bar').style.width='100%';
  const og=document.getElementById('opts-grid');og.innerHTML='';
  questions[idx].a.forEach((txt,i)=>{const d=document.createElement('div');d.className='opt';d.textContent=txt;d.onclick=(e)=>{addRipple(d,e);setTimeout(()=>checkAns(idx,i,d),80);};og.appendChild(d);});
  let t=100;clearInterval(qTimer);
  qTimer=setInterval(()=>{t--;document.getElementById('prog-bar').style.width=t+'%';
    document.getElementById('prog-bar').style.background=t<30?'linear-gradient(90deg,#f43f5e,#fb923c)':'linear-gradient(90deg,#5ecfcc,#7dd3e8)';
    if(t<=0){clearInterval(qTimer);checkAns(idx,-1,null);}},200);
}

function checkAns(qi,chosen,el){
  clearInterval(qTimer);const cor=questions[qi].c;
  const ov=document.getElementById('overlay'),oic=document.getElementById('ov-icon'),osg=document.getElementById('ov-svg');
  ov.style.display='flex';
  if(chosen===cor){if(el)el.classList.add('correct');oic.className='ov-icon ok';osg.innerHTML='<polyline points="20 6 9 17 4 12"/>';
    const sc=document.getElementById('snd-correct');sc.currentTime=0;sc.volume=1;sc.play().catch(()=>{});confetti();}
  else{if(el)el.classList.add('wrong');document.querySelectorAll('.opt')[cor]?.classList.add('correct');oic.className='ov-icon fail';osg.innerHTML='<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';document.getElementById('snd-fail').play().catch(()=>{});}
  done.add(qi);curPlayer=null;document.querySelectorAll('.q-sq').forEach(s=>s.classList.remove('active'));
  setTimeout(()=>{ov.style.display='none';if(done.size>=16){showSlide('s-win');document.getElementById('win-title').textContent='انتهت اللعبة! شكراً للجميع';confetti();setTimeout(confetti,800);}else{showSlide('s-map');setPicked(null,false);buildGrid();}},1800);
}

function showSlide(id){document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

async function init(){
  if(sb){try{const{data:e}=await sb.from('employees').select('name');if(e?.length)employees=e.map(r=>r.name);const{data:q}=await sb.from('game_questions').select('*').order('id',{ascending:true});if(q?.length)questions=q.map(r=>({q:r.question,a:r.options,c:r.correct_index}));}catch(err){console.error('Supabase:',err);}}
  buildWheel();buildGrid();
}
window.addEventListener('DOMContentLoaded',init);
</script>
