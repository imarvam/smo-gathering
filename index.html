<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي التخطيط الاستراتيجي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: #f0f7ff;
            background-image: url('https://raw.githubusercontent.com/imarvam/smo-gathering/main/strategic_planning_modern_bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .game-container {
            width: 95%; max-width: 1100px; height: 88vh;
            background: rgba(255, 255, 255, 0.97); border-radius: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .slide { display: none; width: 100%; height: 100%; padding: 30px; flex-direction: column; align-items: center; justify-content: center; animation: slideUp 0.4s ease; }
        .slide.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Timer */
        .progress-box { width: 100%; height: 12px; background: #e0e0e0; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { width: 100%; height: 100%; background: #00bcd4; transition: width 0.2s linear; }

        .question-h { font-size: 2.2rem; color: #1a237e; text-align: center; margin-bottom: 35px; line-height: 1.4; }
        .opts-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 700px; }
        .opt-item {
            padding: 22px; background: #f5f5f5; border: 2px solid #e0e0e0; border-radius: 15px;
            font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: 0.2s; color: #37474f; text-align: center;
        }
        .opt-item:hover { background: #e3f2fd; border-color: #2196f3; color: #0d47a1; }
        .opt-item.correct { background: #c8e6c9; border-color: #4caf50; color: #1b5e20; }
        .opt-item.incorrect { background: #ffcdd2; border-color: #f44336; color: #b71c1c; }

        .team-tag { padding: 8px 25px; border-radius: 20px; font-weight: 800; margin-bottom: 20px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .btn-ready { padding: 18px 50px; background: #00bcd4; color: white; border: none; border-radius: 15px; font-size: 1.6rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #0097a7; }
        .btn-ready:hover { background: #26c6da; }

        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; font-size:7rem; z-index:100; backdrop-filter: blur(3px); }

        /* ===== MAIN GAME LAYOUT ===== */
        .game-layout {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 30px;
            align-items: center;
            padding: 10px;
        }

        /* ===== WHEEL SECTION ===== */
        .wheel-section {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
        }

        .wheel-pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 36px solid #d81b60;
            z-index: 20;
            filter: drop-shadow(0 3px 6px rgba(216,27,96,0.4));
        }

        .wheel-canvas-container {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 8px solid #1a237e;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25), inset 0 0 20px rgba(255,255,255,0.1);
            overflow: hidden;
            background: #fff;
        }

        #wheelCanvas {
            width: 320px;
            height: 320px;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 40%, #1a237e 100%);
            border: 3px solid #1a237e;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .spin-btn {
            padding: 13px 35px;
            background: linear-gradient(135deg, #d81b60, #ad1457);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 800;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(216, 27, 96, 0.4);
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .spin-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(216, 27, 96, 0.5); }
        .spin-btn:disabled { background: linear-gradient(135deg, #ccc, #aaa); cursor: not-allowed; box-shadow: none; transform: none; }

        .picked-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #d81b60;
            min-height: 2rem;
            text-align: center;
            background: #fce4ec;
            padding: 8px 20px;
            border-radius: 12px;
            border: 2px solid #f48fb1;
            min-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .picked-name.empty {
            background: #f5f5f5;
            border-color: #e0e0e0;
            color: #9e9e9e;
            font-size: 1rem;
            font-weight: 500;
        }

        /* ===== GRID SECTION ===== */
        .grid-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .grid-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a237e;
            text-align: center;
        }

        .grid-ui {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 380px;
        }

        .q-square {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #fff, #e8eaf6);
            border: 3px solid #3949ab;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a237e;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 10px rgba(26,35,126,0.1);
        }
        .q-square:hover { transform: translateY(-5px) scale(1.05); background: linear-gradient(135deg, #e8eaf6, #c5cae9); box-shadow: 0 8px 20px rgba(26,35,126,0.2); }
        .q-square.disabled { background: #eceff1; border-color: #b0bec5; color: #90a4ae; cursor: not-allowed; pointer-events: none; box-shadow: none; transform: none; }
        .q-square.active { border-color: #d81b60; color: #d81b60; background: linear-gradient(135deg, #fce4ec, #f8bbd0); box-shadow: 0 0 20px rgba(216, 27, 96, 0.3); animation: pulse 1s infinite; }
        .q-square.done { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-color: #81c784; color: #388e3c; cursor: not-allowed; pointer-events: none; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(216, 27, 96, 0.3); }
            50% { box-shadow: 0 0 25px rgba(216, 27, 96, 0.6); }
        }

        /* Win screen */
        .win-emoji { font-size: 9rem; margin: 20px 0; animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="game-container">

        <!-- Main Game: Wheel + Grid -->
        <div id="s-map" class="slide active">
            <div class="game-layout">
                <!-- Wheel Section -->
                <div class="wheel-section">
                    <div class="wheel-wrapper">
                        <div class="wheel-pointer"></div>
                        <div class="wheel-canvas-container">
                            <canvas id="wheelCanvas" width="320" height="320"></canvas>
                        </div>
                        <div class="wheel-center"></div>
                    </div>
                    <button id="spin-btn" class="spin-btn" onclick="spinWheel()">🎡 اضغط للدوران</button>
                    <div id="picked-display" class="picked-name empty">في انتظار الدوران...</div>
                </div>

                <!-- Grid Section -->
                <div class="grid-section">
                    <h2 class="grid-title">🧩 اختر سؤالاً</h2>
                    <div id="grid-list" class="grid-ui"></div>
                </div>
            </div>
        </div>

        <!-- Question Slide -->
        <div id="s-q" class="slide">
            <div class="progress-box"><div id="p-bar" class="progress-bar"></div></div>
            <div id="t-name" class="team-tag"></div>
            <div id="q-val" class="question-h"></div>
            <div id="o-list" class="opts-box"></div>
        </div>

        <!-- Win Screen -->
        <div id="s-win" class="slide">
            <h1 id="win-msg" style="font-size: 3.5rem; text-align: center; color: #1a237e;"></h1>
            <div class="win-emoji">🎉</div>
            <button class="btn-ready" onclick="location.reload()">لعب مرة أخرى</button>
        </div>

        <div id="msg-box" class="overlay"></div>
    </div>

    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-fail" src="https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3"></audio>

    <script>
        // Supabase
        const SUPABASE_URL = 'https://peppyvyilwbiynvzjffk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlcHB5dnlpbHdiaXludnpqZmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDYwMzIsImV4cCI6MjA5MDg4MjAzMn0.CgtFQE1HfxxF5lMhxrCNzKRCr8M-BMMwj1jOwbVPsuw';
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // State
        let done = new Set();
        let qTimer = null;
        let isSpinning = false;
        let selectedPlayer = null;
        let currentRotation = 0;
        let playedPlayers = new Set();

        let employees = [
            "عائشة الكواري", "شريفة المنصوري", "ريم المحمد", "مريم القوز", "ندى اليامي",
            "ياسمين العجي", "لولوه آل ثاني", "رامي أبو زيتون", "وصال العنزي", "فاطمة الكبيسي",
            "عائشة الكعبي", "مريم الغانم", "المها المالكي", "موضي الكواري", "نورة السويدي"
        ];

        let dataSet = [
            {q: "ما هو الهدف الأساسي من التخطيط الاستراتيجي؟", a: ["تحديد الاتجاه المستقبلي للمنظمة", "إصدار تقارير شهرية", "الإنفاق العشوائي", "تقليل الموظفين"], c: 0},
            {q: "كيف نتعامل مع تعطل نظام البيانات؟", a: ["نأمل أن لا يحدث", "خطة طوارئ مسبقة", "نستدعي الفني لاحقاً", "نغلق المكتب"], c: 1},
            {q: "أي من هذه مكونات الخطة الاستراتيجية؟", a: ["الرؤية والرسالة والأهداف", "أحلام عشوائية", "الميزانية فقط", "تقليد المنافسين"], c: 0},
            {q: "ما أفضل ممارسة لضمان استمرارية العمل؟", a: ["اختبار البدائل بانتظام", "كتابة الخطة ونسيانها", "الاعتماد على الحظ", "توظيف شخص واحد"], c: 0},
            {q: "كم مرة يجب مراجعة الخطة؟", a: ["سنوياً أو عند تغييرات كبرى", "كل 5 سنوات", "لا داعي للمراجعة", "كلما تذكرنا"], c: 0},
            {q: "ما أخطر سيناريو يواجه الأعمال؟", a: ["فقدان القيادة والبيانات معاً", "انتهاء القهوة", "موظف في إجازة", "اجتماع مطول"], c: 0},
            {q: "تحديات تنفيذ الاستراتيجية؟", a: ["قلة الموارد ومقاومة التغيير", "المال فقط", "الموظفون فقط", "لا توجد تحديات"], c: 0},
            {q: "موظف أساسي ترك الشركة فجأة؟", a: ["نقل المعرفة والتدريب المسبق", "نبحث لاحقاً", "ننتظر", "لا يوجد موظف أساسي"], c: 0},
            {q: "بما تتمايز الشركات الناجحة؟", a: ["التنبؤ والتكيف والقيادة", "الحظ", "تجنب التغيير", "النسخ"], c: 0},
            {q: "خطأ في بيانات مالية أساسية؟", a: ["إبلاغ الإدارة والتحقيق فوراً", "تجاهلها", "إخبار صديق", "انتظار نهاية السنة"], c: 0},
            {q: "مقر منظمة التعاون الإسلامي؟", a: ["جدة", "القاهرة", "أبوظبي", "عمان"], c: 0},
            {q: "الشركات التي لا تخطط؟", a: ["تخطط للفشل", "تعيش اللحظة", "أكثر سعادة", "تعتمد على النجوم"], c: 0},
            {q: "عدد دول مجلس التعاون؟", a: ["6", "5", "7", "4"], c: 0},
            {q: "كم اجتماعاً استغرقت هذه اللعبة؟", a: ["أكثر من اللازم!", "واحد", "بالصدفة", "لم نتفق"], c: 0},
            {q: "سؤال إضافي 1 (يمكنك تعديله لاحقاً)", a: ["خيار 1", "خيار 2", "خيار 3", "خيار 4"], c: 0},
            {q: "سؤال إضافي 2 (يمكنك تعديله لاحقاً)", a: ["خيار 1", "خيار 2", "خيار 3", "خيار 4"], c: 0}
        ];

        // ===== WHEEL DRAWING =====
        const COLORS = [
            '#e3f2fd','#fce4ec','#f3e5f5','#e8f5e9','#fff8e1',
            '#e0f7fa','#fbe9e7','#f1f8e9','#ede7f6','#e8eaf6',
            '#ffecb3','#dcedc8','#b3e5fc','#f8bbd0','#d1c4e9'
        ];
        const BORDER_COLORS = [
            '#1e88e5','#e91e63','#9c27b0','#43a047','#fb8c00',
            '#00acc1','#f4511e','#7cb342','#8e24aa','#3949ab',
            '#f9a825','#558b2f','#0288d1','#d81b60','#5e35b1'
        ];

        function drawWheel(rotation = 0) {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = cx - 2;
            const numSeg = employees.length;
            const segAngle = (2 * Math.PI) / numSeg;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            employees.forEach((name, i) => {
                const startAngle = rotation + i * segAngle;
                const endAngle = startAngle + segAngle;

                // Segment fill
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = COLORS[i % COLORS.length];
                ctx.fill();
                ctx.strokeStyle = BORDER_COLORS[i % BORDER_COLORS.length];
                ctx.lineWidth = 2;
                ctx.stroke();

                // Text
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(startAngle + segAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#1a237e';
                ctx.font = 'bold 11px Tajawal, sans-serif';
                ctx.fillText(name, radius - 12, 4);
                ctx.restore();
            });

            // Center circle
            ctx.beginPath();
            ctx.arc(cx, cy, 18, 0, 2 * Math.PI);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#1a237e';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // ===== WHEEL SPIN =====
        let spinStartTime = null;
        let spinDuration = 4000;
        let spinStartAngle = 0;
        let spinTargetAngle = 0;
        let spinAnimFrame = null;

        function easeOut(t) {
            return 1 - Math.pow(1 - t, 4);
        }

        function animateSpin(timestamp) {
            if (!spinStartTime) spinStartTime = timestamp;
            const elapsed = timestamp - spinStartTime;
            const progress = Math.min(elapsed / spinDuration, 1);
            const eased = easeOut(progress);
            const current = spinStartAngle + (spinTargetAngle - spinStartAngle) * eased;
            drawWheel(current);

            if (progress < 1) {
                spinAnimFrame = requestAnimationFrame(animateSpin);
            } else {
                isSpinning = false;
                currentRotation = current;
                const availableIndices = employees.map((_, i) => i).filter(i => !playedPlayers.has(i));
                // Find which segment is at top (pointer position = -PI/2)
                const angle = (2 * Math.PI) / employees.length;
                const normalizedAngle = ((current % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
                const idx = Math.floor(((2 * Math.PI - normalizedAngle) % (2 * Math.PI)) / angle) % employees.length;
                selectedPlayer = employees[idx];
                playedPlayers.add(idx);

                const display = document.getElementById('picked-display');
                display.classList.remove('empty');
                display.textContent = '🎯 الدور على: ' + selectedPlayer;
                document.getElementById('spin-btn').disabled = false;
                document.querySelectorAll('.q-square:not(.disabled):not(.done)').forEach(s => s.classList.add('active'));
            }
        }

        function spinWheel() {
            if (isSpinning) return;
            const availableIndices = employees.map((_, i) => i).filter(i => !playedPlayers.has(i));
            if (availableIndices.length === 0) {
                alert('تم اختيار جميع الموظفين!');
                return;
            }

            isSpinning = true;
            selectedPlayer = null;
            document.getElementById('spin-btn').disabled = true;
            const display = document.getElementById('picked-display');
            display.classList.add('empty');
            display.textContent = 'جاري الاختيار...';
            document.querySelectorAll('.q-square').forEach(s => s.classList.remove('active'));

            const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            const angle = (2 * Math.PI) / employees.length;
            // Target: segment randomIndex should be at top (angle = -PI/2 from 0)
            const segCenter = randomIndex * angle + angle / 2;
            const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
            // We want: after rotation, top pointer = -PI/2 corresponds to segment
            const targetOffset = (2 * Math.PI - segCenter) + (3 * Math.PI / 2);
            spinStartAngle = currentRotation;
            spinTargetAngle = currentRotation + extraSpins + ((targetOffset - currentRotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
            spinStartTime = null;

            if (spinAnimFrame) cancelAnimationFrame(spinAnimFrame);
            spinAnimFrame = requestAnimationFrame(animateSpin);
        }

        // ===== GRID =====
        function initGrid() {
            const g = document.getElementById('grid-list');
            g.innerHTML = '';
            for (let i = 1; i <= 16; i++) {
                const b = document.createElement('div');
                if (done.has(i - 1)) {
                    b.className = 'q-square done';
                    b.textContent = '✓';
                } else {
                    b.className = 'q-square';
                    b.textContent = i;
                    b.onclick = () => {
                        if (!selectedPlayer) {
                            alert('يرجى تدوير العجلة لاختيار الموظف أولاً!');
                            return;
                        }
                        showQ(i - 1);
                    };
                }
                g.appendChild(b);
            }
        }

        // ===== QUESTION =====
        function showQ(idx) {
            sd('s-q');
            const tag = document.getElementById('t-name');
            tag.textContent = '👤 ' + selectedPlayer;
            tag.style.background = '#e8eaf6';
            tag.style.color = '#1a237e';

            document.getElementById('q-val').textContent = dataSet[idx].q;
            const ol = document.getElementById('o-list');
            ol.innerHTML = '';
            dataSet[idx].a.forEach((t, i) => {
                const btn = document.createElement('div');
                btn.className = 'opt-item';
                btn.textContent = t;
                btn.onclick = () => verify(idx, i, btn);
                ol.appendChild(btn);
            });

            let t = 100;
            const bar = document.getElementById('p-bar');
            bar.style.width = '100%';
            clearInterval(qTimer);
            qTimer = setInterval(() => {
                t -= 1;
                bar.style.width = t + '%';
                if (t <= 0) { clearInterval(qTimer); verify(idx, -1, null); }
            }, 200);
        }

        function verify(qI, c, el) {
            clearInterval(qTimer);
            const cor = dataSet[qI].c;
            const m = document.getElementById('msg-box');
            m.style.display = 'flex';

            if (c === cor) {
                if (el) el.classList.add('correct');
                m.textContent = '✅'; m.style.color = '#4caf50';
                document.getElementById('snd-win').play();
            } else {
                if (el) el.classList.add('incorrect');
                // Show correct answer
                const opts = document.querySelectorAll('.opt-item');
                if (opts[cor]) opts[cor].classList.add('correct');
                m.textContent = '❌'; m.style.color = '#f44336';
                document.getElementById('snd-fail').play();
            }

            done.add(qI);
            selectedPlayer = null;
            document.querySelectorAll('.q-square').forEach(s => s.classList.remove('active'));

            setTimeout(() => {
                m.style.display = 'none';
                if (done.size === 16) {
                    sd('s-win');
                    document.getElementById('win-msg').textContent = 'انتهت اللعبة! شكراً لجميع المشاركين 🏆';
                } else {
                    sd('s-map');
                    initGrid();
                }
            }, 1500);
        }

        function sd(id) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ===== LOAD DATA =====
        async function loadData() {
            if (supabase && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY') {
                try {
                    const { data: empData } = await supabase.from('employees').select('name');
                    if (empData && empData.length > 0) employees = empData.map(e => e.name);

                    const { data: qData } = await supabase.from('game_questions').select('*').order('id', { ascending: true });
                    if (qData && qData.length > 0) {
                        dataSet = qData.map(item => ({ q: item.question, a: item.options, c: item.correct_index }));
                    }
                } catch (err) {
                    console.error('Supabase error:', err);
                }
            }
            drawWheel(0);
            initGrid();
        }

        window.onload = loadData;
    </script>
</body>
</html>
