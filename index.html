<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>التحدي الاستراتيجي — SMO Gathering</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&display=swap');

:root {
  --cream:   #f5f0eb;
  --teal:    #5ecfcc;
  --teal-d:  #3aaea9;
  --orange:  #f5a04a;
  --orange-d:#e0862c;
  --pink:    #f4a0b5;
  --sky:     #7dd3e8;
  --dark:    #2d2d2d;
  --mid:     #6b7280;
  --r:       22px;
  --sh:      0 16px 50px rgba(0,0,0,.10);
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }

body {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  background: linear-gradient(150deg, #efe8e0 0%, #f7f2ed 45%, #e8f5f4 100%);
  overflow:hidden;
}

/* ── CARD ── */
.card {
  width:97%; max-width:1220px; height:93vh;
  background:#fff;
  border-radius:var(--r);
  box-shadow:var(--sh);
  border:1.5px solid rgba(94,207,204,.18);
  display:flex; flex-direction:column;
  overflow:hidden;
  position:relative;
}
/* Rainbow strip */
.card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,var(--teal),var(--pink),var(--orange),var(--sky),var(--teal));
  background-size:200%; animation:rainbow 4s linear infinite; z-index:10;
}
@keyframes rainbow{0%{background-position:0%}100%{background-position:200%}}

/* ── HEADER ── */
.hdr {
  display:flex; align-items:center;
  padding:10px 24px 8px;
  background:linear-gradient(135deg,#fdf9f5,#edfaf9);
  border-bottom:1px solid rgba(94,207,204,.15);
  flex-shrink:0; gap:16px;
  min-height:82px;
}
.hdr-title { flex:1; text-align:center; }
.hdr-title h1 { font-size:1.45rem; font-weight:900; color:var(--dark); }
.hdr-title p  { font-size:.82rem; color:var(--mid); font-weight:500; margin-top:1px; }

/* Characters image with float animation */
.chars-wrap {
  width:160px; flex-shrink:0;
  animation:charFloat 3s ease-in-out infinite;
}
.chars-wrap img { width:100%; display:block; }
@keyframes charFloat {
  0%,100% { transform:translateY(0) rotate(0deg); }
  25%      { transform:translateY(-6px) rotate(1deg); }
  75%      { transform:translateY(-3px) rotate(-1deg); }
}

/* Music button */
.music-btn {
  flex-shrink:0;
  display:flex; align-items:center; gap:6px;
  padding:8px 16px; background:var(--teal); color:#fff;
  border:none; border-radius:50px;
  font-size:.88rem; font-weight:700; font-family:'Tajawal',sans-serif;
  cursor:pointer; box-shadow:0 3px 12px rgba(94,207,204,.4);
  transition:transform .2s,box-shadow .2s; white-space:nowrap;
}
.music-btn:hover { transform:scale(1.05); box-shadow:0 5px 16px rgba(94,207,204,.55); }
.music-btn svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* ── SLIDES ── */
.slide { display:none; width:100%; flex:1; overflow:hidden; animation:fadeUp .32s ease; }
.slide.active { display:flex; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ── MAIN LAYOUT ── */
/* RTL: first child = RIGHT, second = LEFT */
#s-map { flex-direction:row; align-items:stretch; }

/* Panel shared */
.panel-lbl {
  font-size:1.15rem; font-weight:800; color:var(--dark);
  padding-bottom:6px;
  border-bottom:3px solid var(--teal);
  margin-bottom:14px; align-self:center; text-align:center; width:100%;
}

/* ── RIGHT: WHEEL ── */
.pw {
  flex:1.15; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; padding:16px 24px;
  background:linear-gradient(160deg,#fdfaf6 0%,#edfafa 100%);
  border-left:1px solid rgba(94,207,204,.18);
}

.wheel-wrap { position:relative; width:300px; height:300px; }

.ptr {
  position:absolute; top:-26px; left:50%; transform:translateX(-50%);
  z-index:20; filter:drop-shadow(0 3px 6px rgba(0,0,0,.18));
}

.wheel-ring {
  position:absolute; inset:0; border-radius:50%;
  border:9px solid var(--dark);
  box-shadow:0 0 0 3px rgba(255,255,255,.8), 0 8px 28px rgba(0,0,0,.14);
  pointer-events:none; z-index:5;
}
.wheel-ring::after {
  content:''; position:absolute; inset:-3px; border-radius:50%;
  border:2.5px solid var(--teal); opacity:.65;
}

.wheel-svg-wrap {
  position:absolute; top:9px; left:9px;
  width:282px; height:282px;
  border-radius:50%; overflow:hidden;
}
#wheelSVG { width:282px; height:282px; display:block; }

.wheel-hub {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:34px; height:34px; border-radius:50%;
  background:radial-gradient(circle at 38% 38%, #fff 25%, var(--teal-d) 100%);
  border:3px solid var(--dark);
  box-shadow:0 2px 10px rgba(0,0,0,.2); z-index:10;
}
.wheel-hub::after {
  content:''; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:10px; height:10px; background:var(--orange);
  clip-path:polygon(50% 0%,61%35%,98%35%,68%57%,79%91%,50%70%,21%91%,32%57%,2%35%,39%35%);
}

.spin-btn {
  position:relative; overflow:hidden;
  padding:13px 42px;
  background:linear-gradient(135deg, var(--orange), var(--orange-d));
  color:#fff; border:none; border-radius:50px;
  font-size:1.1rem; font-weight:800; font-family:'Tajawal',sans-serif;
  cursor:pointer; letter-spacing:.3px;
  box-shadow:0 5px 18px rgba(245,160,74,.42);
  transition:transform .2s, box-shadow .2s;
}
.spin-btn:hover:not(:disabled) { transform:translateY(-3px) scale(1.03); box-shadow:0 9px 26px rgba(245,160,74,.55); }
.spin-btn:disabled { background:linear-gradient(135deg,#d1d5db,#9ca3af); cursor:not-allowed; box-shadow:none; }
.ripple { position:absolute; border-radius:50%; background:rgba(255,255,255,.35); transform:scale(0); animation:rpl .6s linear; pointer-events:none; }
@keyframes rpl { to{transform:scale(4);opacity:0;} }

.picked-box {
  display:flex; align-items:center; gap:10px;
  padding:10px 22px; border-radius:14px;
  min-width:220px; justify-content:center; transition:all .3s;
}
.picked-box.idle  { background:#f8f4f0; border:2px solid #e5ddd6; color:var(--mid); font-size:.88rem; font-weight:500; }
.picked-box.active {
  background:linear-gradient(135deg,#fff7ee,#fde8c8);
  border:2px solid var(--orange);
  box-shadow:0 3px 14px rgba(245,160,74,.2);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.pb-dot  { width:8px; height:8px; border-radius:50%; background:var(--orange); animation:pulse2 1.5s infinite; }
.pb-name { font-size:1.05rem; font-weight:800; color:var(--dark); }
@keyframes pulse2 { 0%,100%{transform:scale(1);} 50%{transform:scale(1.5);opacity:.6;} }
@keyframes popIn  { from{transform:scale(.7);opacity:0;} to{transform:scale(1);opacity:1;} }

/* ── LEFT: GRID ── */
.pg {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:6px; padding:16px 28px;
  background:#fff;
}

.grid-wrap {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:10px; width:100%; max-width:320px;
  direction:ltr; /* keep numbers left→right */
}

.q-sq {
  aspect-ratio:1; background:#fdf9f6;
  border:2px solid #e8dfd6; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.35rem; font-weight:800; color:var(--dark);
  cursor:pointer; transition:all .22s;
  box-shadow:0 2px 6px rgba(0,0,0,.04);
  user-select:none; position:relative; overflow:hidden;
}
.q-sq:hover { transform:translateY(-5px) scale(1.07); border-color:var(--teal); background:linear-gradient(145deg,#edfafa,#d5f5f4); box-shadow:0 10px 22px rgba(94,207,204,.2); }
.q-sq.active { border-color:var(--orange); color:var(--orange-d); background:linear-gradient(145deg,#fff7ee,#fde8c8); box-shadow:0 0 20px rgba(245,160,74,.4); animation:glowQ 1.3s infinite; }
.q-sq.done   { background:linear-gradient(145deg,#f0fdf4,#dcfce7); border-color:#86efac; color:#16a34a; pointer-events:none; }
.q-sq.done svg { width:22px; height:22px; stroke:#16a34a; stroke-width:2.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
@keyframes glowQ { 0%,100%{box-shadow:0 0 12px rgba(245,160,74,.3);} 50%{box-shadow:0 0 26px rgba(245,160,74,.7);} }

/* ── QUESTION SLIDE ── */
#s-q {
  flex-direction:column; align-items:center; justify-content:center;
  padding:32px 60px;
  background:linear-gradient(160deg,#fdfaf8,#edfafa);
}
.prog-wrap { width:100%; max-width:720px; height:7px; background:#e5dfd9; border-radius:4px; margin-bottom:20px; overflow:hidden; }
.prog-bar  { height:100%; width:100%; background:linear-gradient(90deg,var(--teal),var(--sky)); border-radius:4px; transition:width .2s linear; }
.player-chip {
  display:inline-flex; align-items:center; gap:10px;
  padding:9px 24px; border-radius:50px;
  background:linear-gradient(135deg,var(--teal),var(--teal-d));
  color:#fff; font-weight:800; font-size:.98rem;
  margin-bottom:20px;
  box-shadow:0 5px 16px rgba(94,207,204,.3);
}
.chip-dot { width:7px; height:7px; border-radius:50%; background:#fff; opacity:.7; }
.q-text { font-size:1.85rem; color:var(--dark); text-align:center; line-height:1.6; max-width:740px; font-weight:700; margin-bottom:28px; }
.opts-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; width:100%; max-width:720px; }
.opt {
  padding:18px 16px; background:#fff;
  border:2px solid #e8dfd6; border-radius:16px;
  font-size:1.12rem; font-weight:600; cursor:pointer;
  transition:all .2s; color:var(--dark); text-align:center;
  box-shadow:0 2px 7px rgba(0,0,0,.04);
}
.opt:hover   { border-color:var(--teal); background:linear-gradient(135deg,#edfafa,#d5f5f4); transform:translateY(-3px); box-shadow:0 7px 16px rgba(94,207,204,.15); }
.opt.correct { background:linear-gradient(135deg,#f0fdf4,#dcfce7); border-color:#4ade80; color:#15803d; }
.opt.wrong   { background:linear-gradient(135deg,#fff1f2,#fecdd3); border-color:#f87171; color:#b91c1c; }

/* ── WIN ── */
#s-win { flex-direction:column; align-items:center; justify-content:center; gap:18px; background:linear-gradient(160deg,#fdfaf8,#edfafa); }
.trophy-wrap { width:110px; height:110px; border-radius:50%; background:linear-gradient(135deg,var(--orange),var(--orange-d)); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 36px rgba(245,160,74,.45); animation:trophySway 2s ease infinite; }
.trophy-wrap svg { width:58px; height:58px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
@keyframes trophySway { 0%,100%{transform:translateY(0) rotate(-1.5deg);} 50%{transform:translateY(-14px) rotate(1.5deg);} }
.win-title { font-size:2.6rem; color:var(--dark); font-weight:900; text-align:center; }
.win-sub   { font-size:.95rem; color:var(--mid); text-align:center; }
/* win characters */
.win-chars { animation:charFloat 3s ease-in-out infinite; }
.win-chars img { width:220px; }
.btn-replay {
  display:flex; align-items:center; gap:10px;
  padding:14px 44px; background:linear-gradient(135deg,var(--teal),var(--teal-d));
  color:#fff; border:none; border-radius:50px;
  font-size:1.2rem; font-weight:800; font-family:'Tajawal',sans-serif;
  cursor:pointer; box-shadow:0 6px 20px rgba(94,207,204,.4); transition:all .2s;
}
.btn-replay:hover { transform:translateY(-3px); }
.btn-replay svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; }

/* ── OVERLAY ── */
.overlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(6px); background:rgba(245,240,235,.32); }
.ov-icon { width:130px; height:130px; border-radius:50%; display:flex; align-items:center; justify-content:center; animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both; }
.ov-icon.ok   { background:linear-gradient(135deg,#22c55e,#16a34a); box-shadow:0 14px 44px rgba(34,197,94,.45); }
.ov-icon.fail { background:linear-gradient(135deg,#f43f5e,#be123c); box-shadow:0 14px 44px rgba(244,63,94,.45); }
.ov-icon svg  { width:68px; height:68px; fill:none; stroke:#fff; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }

/* Confetti */
.cf-wrap { position:fixed; inset:0; pointer-events:none; z-index:300; overflow:hidden; }
.cf { position:absolute; top:-10px; border-radius:2px; animation:fall linear forwards; }
@keyframes fall { to{transform:translateY(110vh) rotate(720deg);opacity:0;} }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="cf-wrap" id="confetti"></div>

<audio id="bg-music"    loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-inspiring-story-172.mp3" type="audio/mpeg"></audio>
<audio id="snd-spin"    src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

<div class="card">

  <!-- ═══ HEADER ═══ -->
  <div class="hdr">
    <!-- Characters (right side in RTL = first child) -->
    <div class="chars-wrap">
      <img src="characters.png" alt="SMO Characters" draggable="false">
    </div>

    <!-- Title (center) -->
    <div class="hdr-title">

      <p>SMO Gathering &mdash; May 2026</p>

    <!-- Music button -->
    <button class="music-btn" id="music-btn" onclick="toggleMusic()">
      <svg id="music-icon" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      الموسيقى
    </button>
  </div>

  <!-- ═══ MAIN GAME ═══ -->
  <div id="s-map" class="slide active">

    <!-- RIGHT: WHEEL (first child in RTL) -->
    <div class="pw">
      <div class="panel-lbl">عجلة الاختيار</div>
      <div class="wheel-wrap">
        <div class="ptr">
          <svg width="32" height="48" viewBox="0 0 32 48">
            <polygon points="0,0 16,12 32,0 16,48" fill="#2d2d2d"/>

          </svg>
        </div>
        <div class="wheel-ring"></div>
        <div class="wheel-svg-wrap">
          <svg id="wheelSVG" viewBox="-141 -141 282 282" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="wheel-hub"></div>
      </div>
      <button id="spin-btn" class="spin-btn" onclick="spinWheel(event)">اضغط لتدور العجلة</button>

    <div class="pg">

  <!-- ═══ QUESTION ═══ -->
  <div id="s-q" class="slide">

  </div>

  <!-- ═══ WIN ═══ -->
  <div id="s-win" class="slide">
    <div class="trophy-wrap">
      <svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    </div>
    <div class="win-chars"><img src="characters.png" alt="mascots"></div>
    <h1 id="win-title" class="win-title"></h1>
    <p class="win-sub">أحسنتم جميعاً في المشاركة 🎊</p>
    <button class="btn-replay" onclick="location.reload()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      لعب مرة أخرى
    </button>
  </div>

  <div id="overlay" class="overlay">
    <div id="ov-icon" class="ov-icon"><svg id="ov-svg" viewBox="0 0 24 24"></svg></div>
  </div>
</div>

let questions=[
  {q:"ما هو الهدف الأساسي من التخطيط الاستراتيجي؟",a:["تحديد الاتجاه المستقبلي للمنظمة","إصدار تقارير شهرية","الإنفاق العشوائي","تقليل الموظفين"],c:0},

  {q:"في مصفوفة تقييم المخاطر، كيف يُحسب مستوى الخطر؟",a:["الاحتمالية فقط","التأثير فقط","الاحتمالية × التأثير","التكلفة والوقت معاً"],c:2},

  {q:"عدد دول مجلس التعاون الخليجي؟",a:["6","5","7","4"],c:0},
  {q:"ما الغرض الأساسي من مؤشرات الأداء الرئيسية (KPIs)؟",a:["قياس مدى التقدم نحو تحقيق الأهداف الاستراتيجية","تحديد رواتب الموظفين","تقليص ميزانية التشغيل","استبدال الخطة الاستراتيجية السنوية"],c:0},
  {q:"ما المرحلة التي تلي التنفيذ مباشرةً في دورة التخطيط الاستراتيجي؟",a:["التقييم والمتابعة والرقابة على الأداء","إعادة صياغة الرؤية","تحليل البيئة الداخلية والخارجية","وضع الميزانية التشغيلية"],c:0},

];

/* ─── MUSIC ─── */
let musicOn=false, firstClick=false;
const bgm=document.getElementById('bg-music'); bgm.volume=0.22;
document.addEventListener('click',()=>{
  if(!firstClick){firstClick=true;musicOn=true;bgm.play().then(()=>{
    document.getElementById('music-btn').style.background='#3aaea9';
  }).catch(()=>{});}
},{once:true});

function toggleMusic(){
  musicOn=!musicOn; firstClick=true;
  const ic=document.getElementById('music-icon'),btn=document.getElementById('music-btn');
  if(musicOn){bgm.play().catch(()=>{});btn.style.background='#3aaea9';ic.innerHTML='<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>';}
  else{bgm.pause();btn.style.background='#f5a04a';ic.innerHTML='<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><line x1="2" y1="2" x2="22" y2="22" stroke="#fff" stroke-width="2"/>';}
}

/* ─── RIPPLE ─── */
function addRipple(b,e){
  const rp=document.createElement('span'); rp.className='ripple';
  const rc=b.getBoundingClientRect(),s=Math.max(rc.width,rc.height);
  rp.style.width=rp.style.height=s+'px';
  rp.style.left=(e.clientX-rc.left-s/2)+'px';
  rp.style.top=(e.clientY-rc.top-s/2)+'px';
  b.appendChild(rp); setTimeout(()=>rp.remove(),650);
}

/* ─── CONFETTI ─── */
function confetti(){
  const c=document.getElementById('confetti');
  const cols=['#5ecfcc','#f5a04a','#f4a0b5','#7dd3e8','#fbbf24','#2d2d2d'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div'); el.className='cf';
    const w=5+Math.random()*8,h=7+Math.random()*12,dur=1.5+Math.random()*2;
    el.style.cssText=`left:${Math.random()*100}vw;width:${w}px;height:${h}px;background:${cols[i%cols.length]};animation-duration:${dur}s;animation-delay:${Math.random()*.4}s;`;
    c.appendChild(el); setTimeout(()=>el.remove(),(dur+.6)*1000);
  }
}

/* ─── WHEEL ─── */
const F=['#ffd6e0','#ffdbb5','#fff9b0','#c8f5e0','#b0e8f7','#d5c8f7','#ffc8df','#c8f0e8','#ffeab0','#c8dcf7','#f7c8f0','#c8f7d5','#f7e0c8','#c8c8f7','#e8f7c8','#ffe4b0'];
const S=['#f48fb1','#fba85f','#fcd54f','#4dd87a','#38c6ed','#9575cd','#f06090','#3dcfb1','#fbc835','#5ba8f0','#c86cbe','#44c866','#f07844','#7080d5','#94d86c','#fba040'];
const T=['#9d174d','#92400e','#78350f','#14532d','#0c4a6e','#4b2091','#831843','#134e4a','#713f12','#1e3a5f','#581c87','#14532d','#7c2d12','#283593','#365314','#7c2d12'];

let wheelRot=0,spinning=false,rafId=null,spinStart=null;
const SPIN_DUR=4600;
let done=new Set(),played=new Set(),curPlayer=null,qTimer=null;

function buildWheel(){
  const svg=document.getElementById('wheelSVG'),n=employees.length,deg=360/n;
  svg.innerHTML='';
  employees.forEach((name,i)=>{
    const a1=i*deg,a2=a1+deg,am=a1+deg/2,r=d=>d*Math.PI/180,R=138;
    const x1=R*Math.cos(r(a1)),y1=R*Math.sin(r(a1)),x2=R*Math.cos(r(a2)),y2=R*Math.sin(r(a2));
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M0,0 L${x1},${y1} A${R},${R} 0 ${deg>180?1:0},1 ${x2},${y2} Z`);
    p.setAttribute('fill',F[i%F.length]); p.setAttribute('stroke',S[i%S.length]); p.setAttribute('stroke-width','1.5');
    svg.appendChild(p);
    const TR=84,tx=TR*Math.cos(r(am)),ty=TR*Math.sin(r(am)),parts=splitName(name);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${tx},${ty}) rotate(${am+90})`);
    parts.forEach((pt,pi)=>{
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size',parts.length>1?'8.5':'10'); t.setAttribute('font-weight','700');
      t.setAttribute('font-family','Tajawal,Arial,sans-serif'); t.setAttribute('fill',T[i%T.length]);
      t.setAttribute('y',(pi-(parts.length-1)/2)*11+''); t.textContent=pt; g.appendChild(t);
    });
    svg.appendChild(g);
  });
}

function splitName(n){const p=n.trim().split(' ');return p.length<=1?[n]:p.length===2?p:[p[0],p.slice(1).join(' ')];}
function easeOut(t){return 1-Math.pow(1-t,4);}

function spinWheel(event){
  if(spinning)return;
  const avail=employees.map((_,i)=>i).filter(i=>!played.has(i));
  if(!avail.length){alert('تم اختيار جميع المشاركين!');return;}
  if(event)addRipple(document.getElementById('spin-btn'),event);
  spinning=true; curPlayer=null; document.getElementById('spin-btn').disabled=true;
  setPicked(null,true); document.querySelectorAll('.q-sq:not(.done)').forEach(s=>s.classList.remove('active'));
  const si=document.getElementById('snd-spin'); si.currentTime=0; si.play().catch(()=>{});
  const pick=avail[Math.floor(Math.random()*avail.length)],n=employees.length,sd=360/n;
  const sm=pick*sd+sd/2,extra=(7+Math.floor(Math.random()*4))*360,needed=((270-sm)%360+360)%360;
  const diff=((needed-wheelRot%360)+360)%360,s0=wheelRot,target=wheelRot+extra+diff;
  spinStart=null;
  function animate(ts){
    if(!spinStart)spinStart=ts;
    const prog=Math.min((ts-spinStart)/SPIN_DUR,1),cur=s0+(target-s0)*easeOut(prog);
    document.getElementById('wheelSVG').style.transform=`rotate(${cur}deg)`;
    if(prog<1){rafId=requestAnimationFrame(animate);return;}
    wheelRot=target; spinning=false; curPlayer=employees[pick]; played.add(pick);
    setPicked(curPlayer,false); document.getElementById('spin-btn').disabled=false;
    document.querySelectorAll('.q-sq:not(.done)').forEach(s=>s.classList.add('active'));
  }
  if(rafId)cancelAnimationFrame(rafId); rafId=requestAnimationFrame(animate);
}

function setPicked(name,loading){
  const box=document.getElementById('picked-box');
  if(loading){box.className='picked-box idle';box.innerHTML='<span>جاري الاختيار...</span>';}
  else if(!name){box.className='picked-box idle';box.innerHTML='<span>في انتظار الدوران</span>';}
  else{box.className='picked-box active';box.innerHTML=`<span class="pb-dot"></span><span class="pb-name">${name}</span>`;}
}

function buildGrid(){
  const g=document.getElementById('grid-list'); g.innerHTML='';
  for(let i=1;i<=16;i++){
    const b=document.createElement('div');
    if(done.has(i-1)){b.className='q-sq done';b.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';}
    else{
      b.className='q-sq'+(curPlayer?' active':''); b.textContent=i;
      b.onclick=(e)=>{if(!curPlayer){alert('دوّر العجلة أولاً!');return;}addRipple(b,e);setTimeout(()=>openQ(i-1),100);};
    }
    g.appendChild(b);
  }
}

function openQ(idx){
  showSlide('s-q');
  document.getElementById('player-name').textContent=curPlayer;
  document.getElementById('q-text').textContent=questions[idx].q;
  document.getElementById('prog-bar').style.width='100%';
  const og=document.getElementById('opts-grid'); og.innerHTML='';
  questions[idx].a.forEach((txt,i)=>{
    const d=document.createElement('div'); d.className='opt'; d.textContent=txt;
    d.onclick=(e)=>{addRipple(d,e);setTimeout(()=>checkAns(idx,i,d),80);}; og.appendChild(d);
  });
  let t=100; clearInterval(qTimer);
  qTimer=setInterval(()=>{
    t--; document.getElementById('prog-bar').style.width=t+'%';
    document.getElementById('prog-bar').style.background=t<30?'linear-gradient(90deg,#f43f5e,#fb923c)':'linear-gradient(90deg,#5ecfcc,#7dd3e8)';
    if(t<=0){clearInterval(qTimer);checkAns(idx,-1,null);}
  },200);
}

function checkAns(qi,chosen,el){
  clearInterval(qTimer);
  const cor=questions[qi].c,ov=document.getElementById('overlay'),oic=document.getElementById('ov-icon'),osg=document.getElementById('ov-svg');
  ov.style.display='flex';
  if(chosen===cor){
    if(el)el.classList.add('correct'); oic.className='ov-icon ok'; osg.innerHTML='<polyline points="20 6 9 17 4 12"/>';
    const sc=document.getElementById('snd-correct'); sc.currentTime=0; sc.volume=1; sc.play().catch(()=>{}); confetti();
  } else {
    if(el)el.classList.add('wrong'); document.querySelectorAll('.opt')[cor]?.classList.add('correct');
    oic.className='ov-icon fail'; osg.innerHTML='<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    document.getElementById('snd-fail').play().catch(()=>{});
  }
  done.add(qi); curPlayer=null; document.querySelectorAll('.q-sq').forEach(s=>s.classList.remove('active'));
  setTimeout(()=>{
    ov.style.display='none';
    if(done.size>=16){showSlide('s-win');document.getElementById('win-title').textContent='انتهت اللعبة! شكراً للجميع';confetti();setTimeout(confetti,900);}
    else{showSlide('s-map');setPicked(null,false);buildGrid();}
  },1800);
}

function showSlide(id){document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

async function init(){
  if(sb){try{const{data:e}=await sb.from('employees').select('name');if(e?.length)employees=e.map(r=>r.name);const{data:q}=await sb.from('game_questions').select('*').order('id',{ascending:true});if(q?.length)questions=q.map(r=>({q:r.question,a:r.options,c:r.correct_index}));}catch(err){console.error('Supabase:',err);}}
  buildWheel(); buildGrid();
}
window.addEventListener('DOMContentLoaded',init);
</script>
