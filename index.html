<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي التخطيط الاستراتيجي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: #fdf5e6;
            background-image: url('https://raw.githubusercontent.com/imarvam/smo-gathering/main/strategic_game_background.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        body::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(253, 245, 230, 0.4); z-index: 1;
        }

        .game-container {
            width: 95%; max-width: 1000px; height: 85vh;
            background: rgba(255, 255, 255, 0.95); border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.2);
            position: relative; z-index: 10; border: 10px solid #f8e1cc;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* All Slides */
        .slide {
            display: none; width: 100%; height: 100%; padding: 40px;
            flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.5s ease;
        }
        .slide.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Grid Map */
        .grid-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            width: 100%; max-width: 700px; margin-top: 20px;
        }
        .q-box {
            aspect-ratio: 1; background: linear-gradient(135deg, #fff9f0 0%, #f8e1cc 100%);
            border: 3px solid #d4af37; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 800; color: #8b5e3c;
            cursor: pointer; transition: all 0.3s;
        }
        .q-box:hover { transform: scale(1.1); box-shadow: 0 10px 20px rgba(212,175,55,0.2); }
        .q-box.disabled { background: #d3d3d3; border-color: #a0a0a0; color: #808080; cursor: not-allowed; transform: none; }

        /* Question UI */
        .timer-header {
            width: 100%; height: 15px; background: #eee; border-radius: 10px;
            margin-bottom: 20px; overflow: hidden;
        }
        .timer-bar { width: 100%; height: 100%; background: #4caf50; transition: width 1s linear; }

        .question-text { font-size: 2.2rem; color: #5d4037; text-align: center; margin-bottom: 30px; font-weight: 800; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .option-btn {
            padding: 20px; background: white; border: 3px solid #f1f1f1; border-radius: 20px;
            font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .option-btn:hover { border-color: #d4af37; background: #fffdf5; }
        .option-btn.correct { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .option-btn.incorrect { background: #ffebee; border-color: #f44336; color: #c62828; }

        /* Animations */
        .feedback-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: none; align-items:center; justify-content:center;
            font-size: 5rem; z-index: 100; pointer-events: none;
        }

        /* Buttons */
        .btn-main {
            padding: 15px 40px; background: #8b5e3c; color: white; border: none;
            border-radius: 15px; font-size: 1.4rem; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Start Slide -->
        <div id="slide-start" class="slide active">
            <h1 style="font-size: 3.5rem; color:#8b5e3c;">تحدي التخطيط الاستراتيجي</h1>
            <p style="font-size: 1.5rem; margin: 20px 0;">جاهزون للتحدي؟</p>
            <button class="btn-main" onclick="goToMap()">ابدأ اللعبة</button>
        </div>

        <!-- Map Slide -->
        <div id="slide-map" class="slide">
            <h2 style="color:#8b5e3c; margin-bottom: 20px;">اختر سؤالاً</h2>
            <div id="grid" class="grid-container"></div>
            <div style="margin-top:20px; display:flex; gap:20px;">
                <div style="padding:10px; border-radius:10px; background:#fee7d1;">التخطيط: <span id="s1">0</span></div>
                <div style="padding:10px; border-radius:10px; background:#fce4ec;">المخاطر: <span id="s2">0</span></div>
            </div>
        </div>

        <!-- Question Slide -->
        <div id="slide-question" class="slide">
            <div class="timer-header"><div id="t-bar" class="timer-bar"></div></div>
            <div id="q-team" style="padding:5px 20px; border-radius:20px; margin-bottom:10px; font-weight:bold;"></div>
            <div id="q-text" class="question-text"></div>
            <div id="q-options" class="options-grid"></div>
        </div>

        <!-- Score Slide -->
        <div id="slide-score" class="slide">
            <h1 id="winner-text"></h1>
            <div class="trophy" style="font-size:8rem;">🏆</div>
            <button class="btn-main" onclick="location.reload()">إعادة اللعبة</button>
        </div>

        <div id="feedback" class="feedback-overlay"></div>
    </div>

    <!-- Audio Elements -->
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2010/2010-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/2555/2555-preview.mp3" loop></audio>

    <script>
        const questions = [
            {q: "ما هو الهدف الأساسي من التخطيط الاستراتيجي؟", a: ["تحديد الاتجاه المستقبلي للمنظمة", "إصدار تقارير شهرية", "الإنفاق العشوائي", "تقليل الموظفين"], c: 0},
            {q: "كيف نتعامل مع تعطل نظام البيانات؟", a: ["نأمل أن لا يحدث", "خطة طوارئ مسبقة", "نستدعي الفني لاحقاً", "نغلق المكتب"], c: 1},
            {q: "أي من هذه مكونات الخطة الاستراتيجية؟", a: ["الرؤية والرسالة والأهداف", "أحلام عشوائية", "الميزانية فقط", "تقليد المنافسين"], c: 0},
            {q: "ما أفضل ممارسة لضمان استمرارية العمل؟", a: ["اختبار البدائل بانتظام", "كتابة الخطة ونسيانها", "الاعتماد على الحظ", "توظيف شخص واحد"], c: 0},
            {q: "كم مرة يجب مراجعة الخطة؟", a: ["سنوياً أو عند تغييرات كبرى", "كل 5 سنوات", "لا داعي للمراجعة", "كلما تذكرنا"], c: 0},
            {q: "ما أخطر سيناريو يواجه الأعمال؟", a: ["فقدان القيادة والبيانات معاً", "انتهاء القهوة", "موظف في إجازة", "اجتماع مطول"], c: 0},
            {q: "تحديات تنفيذ الاستراتيجية؟", a: ["قلة الموارد ومقاومة التغيير", "المال فقط", "الموظفون فقط", "لا توجد تحديات"], c: 0},
            {q: "موظف أساسي ترك الشركة فجأة؟", a: ["نقل المعرفة والتدريب المسبق", "نبحث لاحقاً", "ننتظر", "لا يوجد موظف أساسي"], c: 0},
            {q: "بما تتمايز الشركات الناجحة؟", a: ["التنبؤ والتكيف والقيادة", "الحظ", "تجنب التغيير", "النسخ"], c: 0},
            {q: "خطأ في بيانات مالية أساسية؟", a: ["إبلاغ الإدارة والتحقيق فوراً", "تجاهلها", "إخبار صديق", "انتظار نهاية السنة"], c: 0},
            {q: "مقر منظمة التعاون الإسلامي؟", a: ["جدة", "القاهرة", "أبوظبي", "عمان"], c: 0},
            {q: "الشركات التي لا تخطط؟", a: ["تخطط للفشل", "تعيش اللحظة", "أكثر سعادة", "تعتمد على النجوم"], c: 0},
            {q: "عدد دول مجلس التعاون؟", a: ["6", "5", "7", "4"], c: 0},
            {q: "كم اجتماعاً استغرقت هذه اللعبة؟", a: ["أكثر من اللازم!", "واحد", "بالصدفة", "لم نتفق"], c: 0}
        ];

        let s1 = 0, s2 = 0;
        let answered = new Set();
        let timer;

        function goToMap() {
            showSlide('slide-map');
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=1; i<=14; i++) {
                const b = document.createElement('div');
                b.className = 'q-box' + (answered.has(i-1) ? ' disabled' : '');
                b.textContent = i;
                if(!answered.has(i-1)) b.onclick = () => startQ(i-1);
                grid.appendChild(b);
            }
        }

        function showSlide(id) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startQ(idx) {
            const data = questions[idx];
            showSlide('slide-question');
            const teamNode = document.getElementById('q-team');
            const isTeam1 = (answered.size % 2 === 0);
            teamNode.textContent = isTeam1 ? "فريق التخطيط 🎯" : "فريق المخاطر 🛡️";
            teamNode.style.background = isTeam1 ? "#fee7d1" : "#fce4ec";
            
            document.getElementById('q-text').textContent = data.q;
            const optContainer = document.getElementById('q-options');
            optContainer.innerHTML = '';
            data.a.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = txt;
                btn.onclick = () => check(idx, i, btn);
                optContainer.appendChild(btn);
            });

            // Timer
            let time = 100;
            const bar = document.getElementById('t-bar');
            document.getElementById('snd-tick').play();
            clearInterval(timer);
            timer = setInterval(() => {
                time -= 2;
                bar.style.width = time + '%';
                if(time <= 0) {
                    clearInterval(timer);
                    check(idx, -1);
                }
            }, 500);
        }

        function check(qIdx, choice, btn) {
            clearInterval(timer);
            document.getElementById('snd-tick').pause();
            document.getElementById('snd-tick').currentTime = 0;
            
            const correct = questions[qIdx].c;
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'flex';
            
            const isTeam1 = (answered.size % 2 === 0);

            if(choice === correct) {
                if(btn) btn.classList.add('correct');
                feedback.textContent = "✅ رائع!";
                document.getElementById('snd-correct').play();
                if(isTeam1) s1++; else s2++;
            } else {
                if(btn) btn.classList.add('incorrect');
                feedback.textContent = "❌ خطأ";
                document.getElementById('snd-wrong').play();
            }

            answered.add(qIdx);
            document.getElementById('s1').textContent = s1;
            document.getElementById('s2').textContent = s2;

            setTimeout(() => {
                feedback.style.display = 'none';
                if(answered.size === 14) finish();
                else goToMap();
            }, 2000);
        }

        function finish() {
            showSlide('slide-score');
            const txt = s1 > s2 ? "فريق التخطيط هو الفائز! 🏆" : (s2 > s1 ? "فريق المخاطر هو الفائز! 🏆" : "تعادل رائع! 🤝");
            document.getElementById('winner-text').textContent = txt;
        }
    </script>
</body>
</html>
